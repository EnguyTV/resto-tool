/* ---------- Event handlers ---------- */
function refreshReorderButtons(containerSel, attrName){
  const container = $(containerSel);
  if(!container) return;
  const rows = Array.from(container.children);
  rows.forEach((row,i)=>{
    const upBtn = row.querySelector(`[${attrName}="up"]`);
    const downBtn = row.querySelector(`[${attrName}="down"]`);
    if(upBtn) upBtn.disabled = i===0;
    if(downBtn) downBtn.disabled = i===rows.length-1;
  });
}

function bindSyncHandlers(){
  const cfg = SyncConfig.load() || {};
  const ownerEl = $('#syncOwner');
  const repoEl = $('#syncRepo');
  const pathEl = $('#syncPath');
  const branchEl = $('#syncBranch');
  const tokenEl = $('#syncToken');
  const autoSwitch = $('#syncAutoSwitch');
  const autoToggleBtn = $('[data-toggle-sync-auto]');

  if(!ownerEl) return; // Not on settings page

  if(cfg.owner) ownerEl.value = cfg.owner;
  if(cfg.repo) repoEl.value = cfg.repo;
  if(cfg.path) pathEl.value = cfg.path;
  if(cfg.branch) branchEl.value = cfg.branch;
  if(cfg.token) tokenEl.value = cfg.token;
  // Prefill defaults if empty (everything except owner & token)
  if(!repoEl.value) repoEl.value = 'resto-data';
  if(!pathEl.value) pathEl.value = 'resto-data.json';
  if(!branchEl.value) branchEl.value = 'main';
  if(autoSwitch && cfg.auto) autoSwitch.classList.add('on');

  updateSyncStatusUI();

  const helpToggle = $('#syncHelpToggle');
  const helpEl = $('#syncHelp');
  if(helpToggle && helpEl){
    helpToggle.addEventListener('click',e=>{
      e.preventDefault();
      helpEl.style.display = helpEl.style.display==='none' ? 'block' : 'none';
    });
  }
  if(autoToggleBtn && autoSwitch){
    autoToggleBtn.addEventListener('click',()=>{
      autoSwitch.classList.toggle('on');
      const cur = SyncConfig.load() || {};
      cur.auto = autoSwitch.classList.contains('on');
      SyncConfig.save(cur);
      toast(cur.auto ? 'Auto-push activé' : 'Auto-push désactivé');
    });
  }

  const collect = ()=>({
    owner: ownerEl.value.trim(),
    repo: repoEl.value.trim(),
    path: pathEl.value.trim() || 'resto-data.json',
    branch: branchEl.value.trim() || 'main',
    token: tokenEl.value.trim(),
    auto: autoSwitch && autoSwitch.classList.contains('on'),
    lastSync: cfg.lastSync || null
  });

  const saveBtn = $('#syncSaveBtn');
  if(saveBtn) saveBtn.addEventListener('click',()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Owner, repo et token requis'); return; }
    SyncConfig.save(c);
    toast('Config enregistrée');
    updateSyncStatusUI();
  });

  const testBtn = $('#syncTestBtn');
  if(testBtn) testBtn.addEventListener('click',async()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Owner, repo et token requis'); return; }
    testBtn.innerHTML = '<span class="spinner"></span> Test…';
    testBtn.disabled = true;
    try{
      await GitHubSync.test(c);
      toast('✓ Connexion GitHub OK');
    }catch(err){
      alert('Échec : '+err.message);
    }finally{
      testBtn.innerHTML = 'Tester';
      testBtn.disabled = false;
    }
  });

  const pullBtn = $('#syncPullBtn');
  if(pullBtn) pullBtn.addEventListener('click',async()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Configure et enregistre d\'abord'); return; }
    if(!confirm('Récupérer les données depuis GitHub ?\nCela écrasera tes données locales actuelles.')) return;
    SyncConfig.save(c);
    await cloudPull(false);
  });

  const pushBtn = $('#syncPushBtn');
  if(pushBtn) pushBtn.addEventListener('click',async()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Configure et enregistre d\'abord'); return; }
    SyncConfig.save(c);
    await cloudPush(false);
  });

  const clearBtn = $('#syncClearBtn');
  if(clearBtn) clearBtn.addEventListener('click',()=>{
    if(!confirm('Effacer la config sync (les données locales et GitHub restent intactes) ?')) return;
    SyncConfig.clear();
    _currentSha = null;
    toast('Config effacée');
    render();
  });
}

function bindCategoriesHandlers(){
  const cuisinesList = $('#cuisinesList');
  const typesList = $('#typesList');
  const storesList = $('#storesList');
  const addCuisineBtn = $('#addCuisineBtn');
  const addTypeBtn = $('#addTypeBtn');
  const addStoreBtn = $('#addStoreBtn');
  const saveBtn = $('#saveCategoriesBtn');
  const saveStoresBtn = $('#saveStoresBtn');

  if(!cuisinesList) return;

  function bindRow(row, kind){
    const sel = kind==='type' ? '[data-rm-type]' : kind==='store' ? '[data-rm-store]' : '[data-rm-cuis]';
    const rm = row.querySelector(sel);
    if(rm) rm.addEventListener('click',()=>row.remove());
  }
  cuisinesList.querySelectorAll('[data-cuis-row]').forEach(r=>bindRow(r,'cuis'));
  typesList.querySelectorAll('[data-type-row]').forEach(r=>bindRow(r,'type'));
  if(storesList) storesList.querySelectorAll('[data-store-row]').forEach(r=>bindRow(r,'store'));

  if(addCuisineBtn) addCuisineBtn.addEventListener('click',()=>{
    const idx = cuisinesList.children.length;
    const div = document.createElement('div');
    div.innerHTML = `<div class="dynamic-item" data-cuis-row="${idx}">
      <input class="ing-name-i" name="cuis_name" placeholder="Nom de cuisine">
      <button type="button" class="rm" data-rm-cuis>×</button>
    </div>`;
    const el = div.firstElementChild;
    cuisinesList.appendChild(el);
    bindRow(el,'cuis');
    el.querySelector('input').focus();
  });
  if(addTypeBtn) addTypeBtn.addEventListener('click',()=>{
    const idx = typesList.children.length;
    const div = document.createElement('div');
    div.innerHTML = `<div class="dynamic-item" data-type-row="${idx}">
      <input class="ing-name-i" name="type_name" placeholder="Nom de type">
      <button type="button" class="rm" data-rm-type>×</button>
    </div>`;
    const el = div.firstElementChild;
    typesList.appendChild(el);
    bindRow(el,'type');
    el.querySelector('input').focus();
  });
  if(addStoreBtn) addStoreBtn.addEventListener('click',()=>{
    const idx = storesList.children.length;
    const div = document.createElement('div');
    div.innerHTML = `<div class="dynamic-item" data-store-row="${idx}">
      <input class="ing-name-i" name="store_name" placeholder="Nom de magasin">
      <button type="button" class="rm" data-rm-store>×</button>
    </div>`;
    const el = div.firstElementChild;
    storesList.appendChild(el);
    bindRow(el,'store');
    el.querySelector('input').focus();
  });

  if(saveBtn) saveBtn.addEventListener('click',async()=>{
    const cuisines = $$('#cuisinesList input[name="cuis_name"]').map(i=>i.value.trim()).filter(Boolean);
    const types = $$('#typesList input[name="type_name"]').map(i=>i.value.trim()).filter(Boolean);
    state.settings.cuisines = cuisines;
    state.settings.types = types;
    await persist();
    toast('Catégories enregistrées');
    render();
  });
  if(saveStoresBtn) saveStoresBtn.addEventListener('click',async()=>{
    const stores = $$('#storesList input[name="store_name"]').map(i=>i.value.trim()).filter(Boolean);
    state.settings.stores = stores;
    await persist();
    toast('Magasins enregistrés');
    render();
  });
}

function attachHandlers(){
  // Navigation
  $$('[data-go]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    navigate('#'+b.getAttribute('data-go'));
  }));
  $$('[data-back]').forEach(b=>b.addEventListener('click',()=>{
    if(history.length>1) history.back(); else navigate('#home');
  }));
  $$('[data-nav]').forEach(b=>b.addEventListener('click',()=>navigate('#'+b.getAttribute('data-nav'))));

  // Cuisine filter tabs (recipes/fiches)
  $$('[data-rec-cuisine]').forEach(b=>b.addEventListener('click',()=>{
    recipesCuisineFilter = b.getAttribute('data-rec-cuisine');
    render();
  }));
  $$('[data-fic-cuisine]').forEach(b=>b.addEventListener('click',()=>{
    fichesCuisineFilter = b.getAttribute('data-fic-cuisine');
    render();
  }));

  // Pill groups (cuisine/type) — single-select
  $$('[data-pill-group]').forEach(group=>{
    const groupName = group.getAttribute('data-pill-group');
    const hidden = group.parentElement.querySelector(`input[name="${groupName}"]`);
    group.querySelectorAll('[data-pill]').forEach(pill=>{
      pill.addEventListener('click',()=>{
        const val = pill.getAttribute('data-pill');
        if(hidden) hidden.value = val;
        group.querySelectorAll('[data-pill]').forEach(p=>p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  });

  // Live update of link badge in recipe edit
  $$('#ingFields .dynamic-item').forEach(row=>{
    const nameInput = row.querySelector('[name="ing_name"]');
    if(!nameInput) return;
    const badge = row.querySelector('.link-badge');
    if(!badge) return;
    const update = ()=>{
      const v = nameInput.value.trim().toLowerCase();
      const found = v ? state.ingredients.find(i=>i.name.toLowerCase()===v) : null;
      if(found){
        badge.textContent = '⌁';
        badge.style.color = 'var(--success)';
        badge.title = 'Lié à : '+found.name;
      } else {
        badge.textContent = '·';
        badge.style.color = 'var(--cream-faint)';
        badge.title = 'Pas lié à un ingrédient connu';
      }
    };
    nameInput.addEventListener('input',update);
    nameInput.addEventListener('change',update);
  });

  // Reorder ingredient
  $$('[data-move-ing]').forEach(b=>b.addEventListener('click',()=>{
    const dir = b.getAttribute('data-move-ing');
    const row = b.closest('.dynamic-item');
    if(!row) return;
    if(dir==='up'){
      const prev = row.previousElementSibling;
      if(prev) row.parentNode.insertBefore(row, prev);
    } else {
      const next = row.nextElementSibling;
      if(next) row.parentNode.insertBefore(next, row);
    }
    refreshReorderButtons('#ingFields','data-move-ing');
  }));
  // Reorder component
  $$('[data-move-comp]').forEach(b=>b.addEventListener('click',()=>{
    const dir = b.getAttribute('data-move-comp');
    const row = b.closest('.dynamic-item');
    if(!row) return;
    if(dir==='up'){
      const prev = row.previousElementSibling;
      if(prev) row.parentNode.insertBefore(row, prev);
    } else {
      const next = row.nextElementSibling;
      if(next) row.parentNode.insertBefore(next, row);
    }
    refreshReorderButtons('#componentFields','data-move-comp');
  }));

  // Stock filter tabs
  $$('[data-stock-filter]').forEach(b=>b.addEventListener('click',()=>{
    stockFilter = b.getAttribute('data-stock-filter');
    render();
  }));
  $$('[data-stock-store]').forEach(b=>b.addEventListener('click',()=>{
    stockStoreFilter = b.getAttribute('data-stock-store');
    render();
  }));
  // Stock toggle to-buy (handles virtual entries by materializing)
  $$('[data-toggle-stock]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-toggle-stock');
    let s = (state.stock||[]).find(x=>x.id===id);
    if(!s){
      const all = buildStockEntries();
      const v = all.find(x=>x.id===id);
      if(!v) return;
      s = { id: uid('s'), ingredientId: v.ingredientId, name: v.name, qty: null, unit: v.unit, toBuy: true, note: '', store: null };
      if(!state.stock) state.stock = [];
      state.stock.push(s);
    } else {
      s.toBuy = !s.toBuy;
    }
    await persist();
    render();
  }));
  $$('[data-edit-stock]').forEach(b=>b.addEventListener('click',()=>{
    navigate('#stock/'+b.getAttribute('data-edit-stock')+'/edit');
  }));
  $$('[data-del-stock]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-del-stock');
    if(!confirm('Supprimer ce produit de la liste de stock ?')) return;
    state.stock = (state.stock||[]).filter(s=>s.id!==id);
    await persist();
    if(window.location.hash.startsWith('#stock/')) navigate('#stock');
    else render();
  }));
  // Stock add form (custom non-ingredient products)
  const stockForm = $('#stockForm');
  if(stockForm){
    stockForm.addEventListener('submit',async e=>{
      e.preventDefault();
      const fd = new FormData(stockForm);
      const name = fd.get('name').toString().trim();
      if(!name) return;
      if(!state.stock) state.stock = [];
      state.stock.push({
        id: uid('s'),
        ingredientId: null,
        name,
        qty: fd.get('qty')!=='' ? parseFloat(fd.get('qty')) : null,
        unit: fd.get('unit').toString().trim(),
        toBuy: false,
        note: fd.get('note').toString().trim(),
        store: (fd.get('store')||'').toString().trim() || null
      });
      await persist();
      toast('Produit ajouté');
      render();
    });
  }
  // Stock edit form (handles virtual materialization)
  const stockEditForm = $('#stockEditForm');
  if(stockEditForm){
    stockEditForm.addEventListener('submit',async e=>{
      e.preventDefault();
      const editId = stockEditForm.getAttribute('data-edit-id');
      const isVirtual = stockEditForm.getAttribute('data-virtual')==='1';
      const fd = new FormData(stockEditForm);
      let s;
      if(isVirtual){
        const all = buildStockEntries();
        const v = all.find(x=>x.id===editId);
        if(!v){ alert('Entrée introuvable'); return; }
        s = { id: uid('s'), ingredientId: v.ingredientId, name: v.name };
        if(!state.stock) state.stock = [];
        state.stock.push(s);
      } else {
        s = (state.stock||[]).find(x=>x.id===editId);
        if(!s) return;
      }
      if(!s.ingredientId) s.name = fd.get('name').toString().trim();
      s.qty = fd.get('qty')!=='' ? parseFloat(fd.get('qty')) : null;
      s.unit = fd.get('unit').toString().trim();
      s.note = fd.get('note').toString().trim();
      s.toBuy = !!fd.get('toBuy');
      s.store = (fd.get('store')||'').toString().trim() || null;
      await persist();
      toast('Enregistré');
      navigate('#stock');
    });
  }

  // Toggle in form (data-toggle-form)
  $$('[data-toggle-form]').forEach(b=>b.addEventListener('click',()=>{
    const name = b.getAttribute('data-toggle-form');
    const sw = b.querySelector('.toggle-switch');
    sw.classList.toggle('on');
    const hidden = b.parentElement.querySelector(`input[name="${name}"]`);
    if(hidden) hidden.value = sw.classList.contains('on') ? '1' : '';
  }));

  // Top tabs (tasks/routines)
  $$('[data-toptab]').forEach(b=>b.addEventListener('click',()=>{
    tasksTopTab = b.getAttribute('data-toptab');
    render();
  }));

  // Photo handlers
  bindPhotoHandlers();

  // Sync settings handlers
  bindSyncHandlers();
  bindCategoriesHandlers();

  // Routine toggle
  $$('[data-toggle-routine]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-toggle-routine');
    const key = b.getAttribute('data-key');
    const r = (state.routines||[]).find(x=>x.id===id);
    if(!r) return;
    if(!r.checked) r.checked = {};
    r.checked[key] = !r.checked[key];
    await persist();
    render();
  }));
  $$('[data-reset-routine]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-reset-routine');
    const r = (state.routines||[]).find(x=>x.id===id);
    if(!r) return;
    r.checked = {};
    r.lastReset = Date.now();
    await persist();
    toast('Routine réinitialisée');
    render();
  }));
  $$('[data-del-routine]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-del-routine');
    if(!confirm('Supprimer cette routine ?')) return;
    state.routines = (state.routines||[]).filter(r=>r.id!==id);
    await persist();
    toast('Routine supprimée');
    navigate('#tasks');
  }));

  // Routine form
  const routineForm = $('#routineForm');
  if(routineForm){
    bindSectionFieldHandlers('#rouSections');
    $$('[data-add-rou-section]').forEach(b=>b.addEventListener('click',()=>{
      const list = $('#rouSections');
      const idx = list.children.length;
      const div = document.createElement('div');
      div.innerHTML = sectionFieldRow({title:'',items:['']},idx);
      const el = div.firstElementChild;
      list.appendChild(el);
      rebindSectionRow(el);
      el.querySelector('[name="sec_title"]').focus();
    }));
    routineForm.addEventListener('submit',handleRoutineSubmit);
  }

  // Recipe scaler
  const scaler = $('#scaler');
  if(scaler){
    const base = parseFloat(scaler.getAttribute('data-base'));
    const input = $('#scalerVal');
    const multSpan = $('#scalerMult');
    const update = ()=>{
      const cur = parseFloat(input.value);
      if(isNaN(cur) || cur<=0){ multSpan.textContent='×?'; return; }
      const mult = cur/base;
      multSpan.textContent = '×'+(Math.round(mult*100)/100).toString().replace('.',',');
      $$('#ingList .ing-amt-cell').forEach(cell=>{
        const b = parseFloat(cell.getAttribute('data-base'));
        const u = cell.getAttribute('data-unit');
        if(isNaN(b) || b===0){ /* keep "au goût" */ return; }
        cell.innerHTML = fmtAmount(b*mult,u);
      });
    };
    input.addEventListener('input',update);
    $$('#scaler [data-step]').forEach(btn=>btn.addEventListener('click',()=>{
      const step = parseFloat(btn.getAttribute('data-step'));
      const cur = parseFloat(input.value)||0;
      const inc = cur < 1 ? 0.1 : cur < 10 ? 0.5 : cur < 100 ? 1 : 5;
      input.value = Math.max(0, Math.round((cur + step*inc)*100)/100);
      update();
    }));
  }

  // Recipe form
  const recipeForm = $('#recipeForm');
  if(recipeForm){
    $$('#recipeForm [data-add-ing]').forEach(b=>b.addEventListener('click',()=>{
      const list = $('#ingFields');
      const idx = list.children.length;
      const div = document.createElement('div');
      div.innerHTML = ingFieldRow({name:'',amount:0,unit:''},idx);
      const el = div.firstElementChild;
      list.appendChild(el);
      el.querySelector('[data-rm-ing]').addEventListener('click',()=>el.remove());
      el.querySelector('.ing-name-i').focus();
    }));
    $$('#recipeForm [data-rm-ing]').forEach(b=>b.addEventListener('click',()=>b.closest('.dynamic-item').remove()));
    recipeForm.addEventListener('submit',handleRecipeSubmit);
  }
  // Delete recipe
  $$('[data-del-recipe]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-del-recipe');
    if(!confirm('Supprimer cette recette ?')) return;
    state.recipes = state.recipes.filter(r=>r.id!==id);
    state.fiches.forEach(f=>{ f.linkedRecipes = (f.linkedRecipes||[]).filter(x=>x!==id); });
    await persist();
    toast('Recette supprimée');
    navigate('#recipes');
  }));

  // Fiche form
  const ficheForm = $('#ficheForm');
  if(ficheForm){
    bindFicheFormHandlers();
    ficheForm.addEventListener('submit',handleFicheSubmit);
  }
  $$('[data-del-fiche]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-del-fiche');
    if(!confirm('Supprimer cette fiche ?')) return;
    state.fiches = state.fiches.filter(f=>f.id!==id);
    await persist();
    toast('Fiche supprimée');
    navigate('#fiches');
  }));

  // Tasks
  $$('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    tasksTab = b.getAttribute('data-tab');
    render();
  }));
  $$('[data-toggle-task]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-toggle-task');
    const t = state.tasks.find(x=>x.id===id);
    if(t){ t.done = !t.done; t.lastDone = t.done ? Date.now() : null; await persist(); render(); }
  }));
  $$('[data-del-task]').forEach(b=>b.addEventListener('click',async(e)=>{
    e.stopPropagation();
    const id = b.getAttribute('data-del-task');
    state.tasks = state.tasks.filter(t=>t.id!==id);
    await persist();
    render();
  }));
  const taskForm = $('#taskForm');
  if(taskForm){
    const freqSel = taskForm.querySelector('[name="frequency"]');
    const dayWrap = $('#dayWrap');
    const updateDayWrap = ()=>{ dayWrap.style.display = freqSel.value==='weekly'?'block':'none'; };
    freqSel.addEventListener('change',updateDayWrap);
    updateDayWrap();
    taskForm.addEventListener('submit',async e=>{
      e.preventDefault();
      const fd = new FormData(taskForm);
      const t = {
        id: uid('t'),
        title: fd.get('title').toString().trim(),
        frequency: fd.get('frequency'),
        day: parseInt(fd.get('day')||'1',10),
        done:false,lastDone:null
      };
      if(!t.title) return;
      state.tasks.push(t);
      await persist();
      toast('Tâche ajoutée');
      render();
    });
  }
  const resetTasksBtn = $('[data-reset-tasks]');
  if(resetTasksBtn) resetTasksBtn.addEventListener('click',async()=>{
    state.tasks.forEach(t=>{t.done=false;t.lastDone=null;});
    await persist();
    toast('Tâches réinitialisées');
    render();
  });

  // Ingredient form
  const ingForm = $('#ingForm');
  if(ingForm){
    ingForm.addEventListener('submit',handleIngSubmit);
  }
  $$('[data-del-ing]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-del-ing');
    if(!confirm('Supprimer cet ingrédient ?')) return;
    state.ingredients = state.ingredients.filter(x=>x.id!==id);
    await persist();
    toast('Ingrédient supprimé');
    navigate('#ingredients');
  }));

  // Settings
  $$('[data-toggle-setting]').forEach(b=>b.addEventListener('click',async()=>{
    const k = b.getAttribute('data-toggle-setting');
    state.settings[k] = !state.settings[k];
    await persist();
    render();
  }));
  const cur = $('#currencySel');
  if(cur) cur.addEventListener('change',async()=>{ state.settings.currency = cur.value; await persist(); toast('Devise mise à jour'); });
  const exportBtn = $('#exportBtn');
  if(exportBtn) exportBtn.addEventListener('click',()=>{
    const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='resto-tool-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('Export téléchargé');
  });
  const importBtn = $('#importBtn');
  const importFile = $('#importFile');
  if(importBtn) importBtn.addEventListener('click',()=>importFile.click());
  if(importFile) importFile.addEventListener('change',async e=>{
    const f = e.target.files[0]; if(!f) return;
    try{
      const txt = await f.text();
      const data = JSON.parse(txt);
      if(!data.recipes || !data.ingredients){ throw new Error('format invalide'); }
      if(!confirm('Remplacer toutes tes données par celles du fichier ?')) return;
      state = data;
      await persist();
      toast('Import réussi');
      render();
    }catch(err){
      alert('Import impossible : '+err.message);
    }
  });
  const restoreBtn = $('#restoreDefaultsBtn');
  if(restoreBtn) restoreBtn.addEventListener('click',async()=>{
    if(!confirm('Restaurer les recettes/fiches d\'origine manquantes ?\nCelles que tu as créées ou modifiées ne seront pas touchées.')) return;
    const def = defaultData();
    let added = 0;
    // Recipes
    def.recipes.forEach(d=>{
      if(!state.recipes.find(r=>r.id===d.id)){
        state.recipes.push(d); added++;
      }
    });
    // Fiches
    def.fiches.forEach(d=>{
      if(!state.fiches.find(f=>f.id===d.id)){
        state.fiches.push(d); added++;
      }
    });
    // Ingredients
    def.ingredients.forEach(d=>{
      if(!state.ingredients.find(i=>i.id===d.id)){
        state.ingredients.push(d); added++;
      }
    });
    // Routines
    def.routines.forEach(d=>{
      if(!state.routines.find(r=>r.id===d.id)){
        state.routines.push(d); added++;
      }
    });
    await persist();
    toast(added > 0 ? `${added} élément${added>1?'s':''} restauré${added>1?'s':''}` : 'Rien à restaurer');
    render();
  });
  const resetBtn = $('#resetBtn');
  if(resetBtn) resetBtn.addEventListener('click',async()=>{
    if(!confirm('Tout effacer ? Cette action est définitive.')) return;
    if(!confirm('Vraiment ? Toutes les recettes, fiches, tâches seront perdues.')) return;
    await Storage.clear();
    state = defaultData();
    await persist();
    toast('Réinitialisé');
    navigate('#home');
  });
}

/* ---------- Fiche form helpers ---------- */
function bindFicheFormHandlers(){
  $$('#ficheForm [data-add-section]').forEach(b=>b.addEventListener('click',()=>{
    const list = $('#sectionFields');
    const idx = list.children.length;
    const div = document.createElement('div');
    div.innerHTML = sectionFieldRow({title:'',items:['']},idx);
    const el = div.firstElementChild;
    list.appendChild(el);
    rebindSectionRow(el);
    el.querySelector('[name="sec_title"]').focus();
  }));
  $$('#ficheForm [data-add-variant]').forEach(b=>b.addEventListener('click',()=>{
    const list = $('#variantFields');
    const idx = list.children.length;
    const div = document.createElement('div');
    div.innerHTML = variantFieldRow({title:'',desc:''},idx);
    const el = div.firstElementChild;
    list.appendChild(el);
    el.querySelector('[data-rm-variant]').addEventListener('click',()=>el.remove());
  }));
  // Components
  $$('#ficheForm [data-add-component]').forEach(b=>b.addEventListener('click',()=>{
    const list = $('#componentFields');
    const idx = list.children.length;
    const div = document.createElement('div');
    div.innerHTML = componentFieldRow({type:'recipe',refId:'',amount:0,unit:'g',label:''},idx);
    const el = div.firstElementChild;
    list.appendChild(el);
    bindComponentRow(el);
  }));
  $$('#componentFields > [data-component]').forEach(bindComponentRow);

  $$('#sectionFields > [data-section]').forEach(rebindSectionRow);
  $$('[data-rm-variant]').forEach(b=>b.addEventListener('click',()=>b.closest('[data-variant]').remove()));
}

function bindComponentRow(el){
  const typeSel = el.querySelector('select.comp-type');
  const refSel = el.querySelector('select.comp-ref');
  if(typeSel && refSel){
    typeSel.addEventListener('change',()=>{
      const type = typeSel.value;
      const opts = type==='recipe'
        ? state.recipes.map(r=>`<option value="${r.id}">${escHtml(r.name)}</option>`).join('')
        : state.ingredients.map(g=>`<option value="${g.id}">${escHtml(g.name)}</option>`).join('');
      refSel.innerHTML = opts;
    });
  }
  const rm = el.querySelector('[data-rm-component]');
  if(rm) rm.addEventListener('click',()=>el.remove());
}

function bindSectionFieldHandlers(containerSel){
  $$(`${containerSel} > .fiche-section`).forEach(rebindSectionRow);
}

function bindPhotoHandlers(){
  // Empty state — click triggers file input
  $$('[data-photo-empty]').forEach(empty=>{
    const input = empty.querySelector('[data-photo-input]');
    if(!input) return;
    empty.addEventListener('click',e=>{
      if(e.target.tagName==='INPUT') return;
      input.click();
    });
    input.addEventListener('change',e=>handlePhotoChoose(e,empty,'empty'));
  });
  // Preview state — change / remove
  $$('[data-photo-preview]').forEach(preview=>{
    const input = preview.querySelector('[data-photo-input]');
    const change = preview.querySelector('[data-photo-change]');
    const remove = preview.querySelector('[data-photo-remove]');
    if(change && input){
      change.addEventListener('click',e=>{ e.preventDefault(); input.click(); });
      input.addEventListener('change',e=>handlePhotoChoose(e,preview,'preview'));
    }
    if(remove){
      remove.addEventListener('click',e=>{
        e.preventDefault();
        // Replace with empty state in place
        const wrap = preview.parentElement;
        preview.outerHTML = photoFieldHtml(null);
        bindPhotoHandlers();
      });
    }
  });
}

async function handlePhotoChoose(e,container,kind){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await compressImage(file, 1000, 0.75);
    // Replace container content with new preview
    const wrap = container.parentElement;
    container.outerHTML = photoFieldHtml(dataUrl);
    bindPhotoHandlers();
  }catch(err){
    alert('Impossible de lire l\'image : '+(err && err.message || err));
  }
}

function rebindSectionRow(el){
  const rmSec = el.querySelector('[data-rm-section]');
  if(rmSec) rmSec.addEventListener('click',()=>el.remove());
  el.querySelectorAll('[data-rm-item]').forEach(b=>b.addEventListener('click',()=>b.closest('.dynamic-item').remove()));
  const addBtn = el.querySelector('[data-add-item]');
  if(addBtn){
    addBtn.addEventListener('click',()=>{
      const items = el.querySelector('[data-items]');
      const div = document.createElement('div');
      div.className='dynamic-item';
      div.innerHTML = `<input class="ing-name-i" name="sec_item" placeholder="Élément">
        <button type="button" class="rm" data-rm-item>×</button>`;
      items.appendChild(div);
      div.querySelector('[data-rm-item]').addEventListener('click',()=>div.remove());
      div.querySelector('input').focus();
    });
  }
}

/* ---------- Form submit handlers ---------- */
async function handleRecipeSubmit(e){
  e.preventDefault();
  const f = e.target;
  const fd = new FormData(f);
  const editId = f.getAttribute('data-edit-id');

  const ings = [];
  $$('#ingFields .dynamic-item').forEach(row=>{
    const name = row.querySelector('[name="ing_name"]').value.trim();
    if(!name) return;
    const amount = parseFloat(row.querySelector('[name="ing_amount"]').value)||0;
    const unit = row.querySelector('[name="ing_unit"]').value.trim();
    const matched = state.ingredients.find(i=>i.name.toLowerCase()===name.toLowerCase());
    const ingObj = {name, amount, unit};
    if(matched) ingObj.ingredientId = matched.id;
    ings.push(ingObj);
  });

  const photo = (fd.get('photo')||'').toString() || null;
  const data = {
    name: fd.get('name').toString().trim(),
    category: fd.get('category').toString().trim(),
    cuisine: (fd.get('cuisine')||'').toString().trim(),
    type: (fd.get('type')||'').toString().trim(),
    photo,
    baseAmount: parseFloat(fd.get('baseAmount'))||1,
    baseUnit: fd.get('baseUnit').toString().trim()||'kg',
    baseLabel: fd.get('baseLabel').toString().trim(),
    ingredients: ings,
    instructions: fd.get('instructions').toString(),
    prepTime: fd.get('prepTime')!=='' ? parseFloat(fd.get('prepTime')) : null,
    cookTemp: fd.get('cookTemp')!=='' ? parseFloat(fd.get('cookTemp')) : null,
    cookTime: fd.get('cookTime')!=='' ? parseFloat(fd.get('cookTime')) : null,
    notes: fd.get('notes').toString()
  };
  if(!data.name){ alert('Le nom est requis'); return; }

  try{
    if(editId){
      const r = state.recipes.find(x=>x.id===editId);
      Object.assign(r, data);
      await persist();
      toast('Recette enregistrée');
      navigate('#recipe/'+editId);
    } else {
      const id = uid('rec');
      state.recipes.push({id, ...data});
      await persist();
      toast('Recette créée');
      navigate('#recipe/'+id);
    }
  }catch(err){
    alert('Erreur de sauvegarde : '+(err && err.message || err));
  }
}

async function handleFicheSubmit(e){
  e.preventDefault();
  const f = e.target;
  const fd = new FormData(f);
  const editId = f.getAttribute('data-edit-id');

  const sections = [];
  $$('#sectionFields > [data-section]').forEach(secEl=>{
    const title = secEl.querySelector('[name="sec_title"]').value.trim();
    if(!title) return;
    const items = [];
    secEl.querySelectorAll('[data-items] [name="sec_item"]').forEach(inp=>{
      const v = inp.value.trim(); if(v) items.push(v);
    });
    sections.push({title, items});
  });

  const variants = [];
  $$('#variantFields > [data-variant]').forEach(vEl=>{
    const title = vEl.querySelector('[name="var_title"]').value.trim();
    if(!title) return;
    const desc = vEl.querySelector('[name="var_desc"]').value.trim();
    variants.push({title,desc});
  });

  const components = [];
  $$('#componentFields > [data-component]').forEach(cEl=>{
    const type = cEl.querySelector('[name="comp_type"]').value;
    const refId = cEl.querySelector('[name="comp_ref"]').value;
    if(!refId) return;
    const label = cEl.querySelector('[name="comp_label"]').value.trim();
    const amount = parseFloat(cEl.querySelector('[name="comp_amount"]').value)||0;
    const unit = cEl.querySelector('[name="comp_unit"]').value.trim()||'g';
    components.push({type, refId, label, amount, unit});
  });

  const photo = (fd.get('photo')||'').toString() || null;
  const data = {
    name: fd.get('name').toString().trim(),
    category: fd.get('category').toString().trim()||'Plat',
    cuisine: (fd.get('cuisine')||'').toString().trim(),
    type: (fd.get('type')||'').toString().trim(),
    photo,
    prepTime: fd.get('prepTime')!=='' ? parseFloat(fd.get('prepTime')) : null,
    sections,
    components,
    variants,
    notes: fd.get('notes').toString()
  };
  if(!data.name){ alert('Le nom est requis'); return; }

  try{
    if(editId){
      const fi = state.fiches.find(x=>x.id===editId);
      Object.assign(fi, data);
      await persist();
      toast('Fiche enregistrée');
      navigate('#fiche/'+editId);
    } else {
      const id = uid('fic');
      state.fiches.push({id, ...data});
      await persist();
      toast('Fiche créée');
      navigate('#fiche/'+id);
    }
  }catch(err){
    alert('Erreur de sauvegarde : '+(err && err.message || err));
  }
}

async function handleRoutineSubmit(e){
  e.preventDefault();
  const f = e.target;
  const fd = new FormData(f);
  const editId = f.getAttribute('data-edit-id');

  const sections = [];
  $$('#rouSections > [data-section]').forEach(secEl=>{
    const title = secEl.querySelector('[name="sec_title"]').value.trim();
    if(!title) return;
    const items = [];
    secEl.querySelectorAll('[data-items] [name="sec_item"]').forEach(inp=>{
      const v = inp.value.trim(); if(v) items.push(v);
    });
    if(items.length) sections.push({title, items});
  });

  const data = {
    name: fd.get('name').toString().trim(),
    subtitle: fd.get('subtitle').toString().trim(),
    sections
  };
  if(!data.name){ alert('Le nom est requis'); return; }
  if(!sections.length){ alert('Ajoute au moins une section avec des étapes'); return; }

  try{
    if(!state.routines) state.routines = [];
    if(editId){
      const r = state.routines.find(x=>x.id===editId);
      Object.assign(r, data);
      // keep existing checked state
      await persist();
      toast('Routine enregistrée');
      navigate('#routine/'+editId);
    } else {
      const id = uid('rou');
      state.routines.push({id, ...data, checked:{}, lastReset:null});
      await persist();
      toast('Routine créée');
      navigate('#routine/'+id);
    }
  }catch(err){
    alert('Erreur de sauvegarde : '+(err && err.message || err));
  }
}

async function handleIngSubmit(e){
  e.preventDefault();
  const f = e.target;
  const fd = new FormData(f);
  const editId = f.getAttribute('data-edit-id');
  const num = k => fd.get(k)!=='' && fd.get(k)!=null ? parseFloat(fd.get(k)) : null;
  const data = {
    name: fd.get('name').toString().trim(),
    unit: fd.get('unit').toString().trim()||'kg',
    price: num('price'),
    halal: !!fd.get('halal'),
    kcal100: num('kcal100'),
    protein100: num('protein100'),
    fat100: num('fat100'),
    carbs100: num('carbs100'),
    notes: fd.get('notes').toString()
  };
  if(!data.name){ alert('Le nom est requis'); return; }
  if(editId){
    const ing = state.ingredients.find(x=>x.id===editId);
    Object.assign(ing,data);
    await persist();
    toast('Ingrédient enregistré');
  } else {
    state.ingredients.push({id:uid('ing'),...data});
    await persist();
    toast('Ingrédient créé');
  }
  navigate('#ingredients');
}

/* ---------- Init ---------- */
async function init(){
  let loaded = await Storage.load();

  // Migrate from v2 or v1 if no v3 found
  if(!loaded){
    let prev = null;
    let prevVersion = null;
    try{ const raw = localStorage.getItem('restoTool_v2'); if(raw){ prev = JSON.parse(raw); prevVersion='v2'; } }catch(e){}
    if(!prev){
      try{ const raw = localStorage.getItem('restoTool_v1'); if(raw){ prev = JSON.parse(raw); prevVersion='v1'; } }catch(e){}
    }
    if(prev){
      loaded = defaultData();
      if(Array.isArray(prev.recipes)) loaded.recipes = prev.recipes.map(r=>({photo:null,prepTime:null,cuisine:'',type:'',...r}));
      if(Array.isArray(prev.fiches)) loaded.fiches = prev.fiches.map(f=>({photo:null,prepTime:null,components:[],cuisine:'',type:'',...f}));
      if(Array.isArray(prev.tasks)) loaded.tasks = prev.tasks;
      if(Array.isArray(prev.ingredients)) loaded.ingredients = prev.ingredients;
      if(Array.isArray(prev.routines)) loaded.routines = prev.routines;
      if(prev.settings) loaded.settings = Object.assign(loaded.settings, prev.settings);
      toast('Données '+prevVersion+' migrées vers v3');
    } else {
      loaded = defaultData();
    }
    await Storage.save(loaded);
  }

  // Defensive defaults
  loaded.settings = Object.assign({
    showPrices:false, showCalories:true, showHalal:true, currency:'€',
    cuisines: ['burger','mexicain'],
    types: ['viandes','garnitures','sides','suppléments','sauces','marinades','féculents','pâtisserie','autres'],
    stores: ['Sligro','Carrefour','Magasins du monde']
  }, loaded.settings||{});
  if(!loaded.settings.cuisines || !loaded.settings.cuisines.length) loaded.settings.cuisines = ['burger','mexicain'];
  if(!loaded.settings.types || !loaded.settings.types.length) loaded.settings.types = ['viandes','garnitures','sides','suppléments','sauces','marinades','féculents','pâtisserie','autres'];
  if(!loaded.settings.stores) loaded.settings.stores = ['Sligro','Carrefour','Magasins du monde'];

  loaded.fiches = loaded.fiches||[];
  loaded.tasks = loaded.tasks||[];
  loaded.ingredients = loaded.ingredients||[];
  loaded.routines = loaded.routines||[];
  loaded.recipes = loaded.recipes||[];
  loaded.stock = loaded.stock||[];

  loaded.recipes.forEach(r=>{
    if(r.photo===undefined) r.photo = null;
    if(r.prepTime===undefined) r.prepTime = null;
    if(r.cuisine===undefined) r.cuisine = '';
    if(r.type===undefined) r.type = '';
  });
  loaded.fiches.forEach(f=>{
    if(f.photo===undefined) f.photo = null;
    if(f.prepTime===undefined) f.prepTime = null;
    if(!f.components) f.components = [];
    if(f.cuisine===undefined) f.cuisine = '';
    if(f.type===undefined) f.type = '';
  });

  state = loaded;
  window.addEventListener('hashchange',render);
  render();

  // Auto-pull at startup if sync configured
  const syncCfg = SyncConfig.load();
  if(syncCfg && syncCfg.token && syncCfg.owner && syncCfg.repo && syncCfg.auto){
    setTimeout(()=>{
      cloudPull(true).then(success=>{ if(!success) updateSyncStatusUI(); });
    }, 500);
  }
}
init();
</script>
