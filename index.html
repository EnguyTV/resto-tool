<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Resto">
<meta name="theme-color" content="#15181E">
<title>Resto Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#203554;
  --navy-2:#1a2b45;
  --cyan:#66C5DB;
  --gold:#E4A209;
  --dark:#15181E;
  --dark-2:#0e1116;
  --cream:#FFF1CD;
  --cream-dim:rgba(255,241,205,.65);
  --cream-faint:rgba(255,241,205,.4);
  --line:rgba(102,197,219,.18);
  --line-strong:rgba(102,197,219,.35);
  --danger:#E45A40;
  --success:#7BC47F;
  --font-display:'Bebas Neue','Impact','Oswald',sans-serif;
  --font-body:'Oswald',sans-serif;
  --safe-top:env(safe-area-inset-top,0);
  --safe-bot:env(safe-area-inset-bottom,0);
  --bg-grad-1:rgba(32,53,84,.6);
  --bg-grad-2:rgba(228,162,9,.08);
}
/* Thème SOMBRE : noir profond, accents froids, minimal */
html[data-theme="sombre"]{
  --navy:#1c1c1f;
  --navy-2:#161618;
  --cyan:#8AB4D8;
  --gold:#C9A24B;
  --dark:#0a0a0b;
  --dark-2:#050506;
  --cream:#EDEDEF;
  --cream-dim:rgba(237,237,239,.6);
  --cream-faint:rgba(237,237,239,.35);
  --line:rgba(255,255,255,.1);
  --line-strong:rgba(255,255,255,.22);
  --danger:#D85A4A;
  --success:#6FB97A;
  --bg-grad-1:rgba(40,40,45,.5);
  --bg-grad-2:rgba(255,255,255,.02);
}
/* Thème CLASSIQUE : clair, sobre, lisible, type fiche papier */
html[data-theme="classique"]{
  --navy:#ffffff;
  --navy-2:#f4f4f2;
  --cyan:#1f6f8b;
  --gold:#A9762B;
  --dark:#f7f6f3;
  --dark-2:#ffffff;
  --cream:#23211e;
  --cream-dim:rgba(35,33,30,.7);
  --cream-faint:rgba(35,33,30,.45);
  --line:rgba(31,111,139,.2);
  --line-strong:rgba(31,111,139,.4);
  --danger:#C0392B;
  --success:#2E7D4F;
  --bg-grad-1:rgba(0,0,0,.02);
  --bg-grad-2:rgba(169,118,43,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--dark);color:var(--cream);font-family:var(--font-body);font-weight:500;letter-spacing:.02em;overscroll-behavior-y:none}
body{background:
  radial-gradient(ellipse at top,var(--bg-grad-1) 0%,transparent 60%),
  radial-gradient(ellipse at bottom right,var(--bg-grad-2) 0%,transparent 50%),
  var(--dark);
  min-height:100vh;min-height:100dvh}
button,input,textarea,select{font-family:inherit;font-weight:inherit;color:inherit;letter-spacing:inherit}
button{background:none;border:none;cursor:pointer}
a{color:var(--cyan);text-decoration:none}
input,textarea,select{background:var(--dark-2);border:1px solid var(--line);color:var(--cream);padding:12px 14px;border-radius:6px;width:100%;font-size:16px;outline:none;transition:border-color .15s,background .15s}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);background:var(--dark)}
textarea{resize:vertical;min-height:80px;font-family:var(--font-body)}
::placeholder{color:var(--cream-faint)}

/* ===== Layout ===== */
#app{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bot) + 80px);position:relative}
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--dark) 70%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:14px 18px 12px;display:flex;align-items:center;gap:12px}
.topbar .back{width:36px;height:36px;border-radius:50%;background:rgba(102,197,219,.1);display:flex;align-items:center;justify-content:center;color:var(--cyan);flex-shrink:0;transition:background .15s}
.topbar .back:active{background:rgba(102,197,219,.25)}
.topbar h1{font-family:var(--font-display);font-size:28px;letter-spacing:.04em;color:var(--gold);line-height:1;flex:1;text-transform:uppercase}
.topbar .actions{display:flex;gap:8px}
.topbar .iconbtn{width:36px;height:36px;border-radius:50%;background:rgba(228,162,9,.12);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar .iconbtn:active{background:rgba(228,162,9,.25)}
.view{flex:1;padding:0 18px 24px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Bottom nav ===== */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--dark-2);border-top:1px solid var(--line);padding:8px 0 calc(var(--safe-bot) + 8px);display:flex;justify-content:space-around;z-index:60}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--cream-faint);font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;transition:color .15s;min-width:0}
.bottomnav button.active{color:var(--gold)}
.bottomnav button .nav-ico{font-size:20px;line-height:1}

/* ===== Home grid ===== */
.hero{padding:24px 0 28px;text-align:center}
.hero .brand{font-family:var(--font-display);font-size:64px;line-height:.85;color:var(--gold);letter-spacing:.04em;text-transform:uppercase}
.hero .brand .accent{color:var(--cream);display:block;font-size:42px;margin-top:4px}
.hero .tag{margin-top:14px;color:var(--cyan);font-size:12px;letter-spacing:.3em;text-transform:uppercase;font-weight:600}
.grid-home{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.tile{aspect-ratio:1;background:var(--navy);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform .12s,border-color .15s}
.tile:active{transform:scale(.97)}
.tile::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(102,197,219,.08));pointer-events:none}
.tile .tile-ico{font-size:34px;line-height:1}
.tile .tile-name{font-family:var(--font-display);font-size:24px;color:var(--cream);text-transform:uppercase;letter-spacing:.04em;line-height:1}
.tile .tile-sub{font-size:11px;color:var(--cyan);text-transform:uppercase;letter-spacing:.15em;font-weight:600;margin-top:2px}
.tile.gold{background:linear-gradient(135deg,var(--gold) 0%,#c8890a 100%);border-color:var(--gold)}
.tile.gold .tile-name{color:var(--dark)}
.tile.gold .tile-sub{color:var(--navy)}
.tile.cyan{background:linear-gradient(135deg,var(--cyan) 0%,#3ea3bd 100%);border-color:var(--cyan)}
.tile.cyan .tile-name{color:var(--dark)}
.tile.cyan .tile-sub{color:var(--navy)}

/* ===== Section header ===== */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin:8px 0 18px;gap:12px}
.section-head h2{font-family:var(--font-display);font-size:32px;color:var(--gold);letter-spacing:.04em;text-transform:uppercase;line-height:1}
.section-head .count{color:var(--cyan);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;padding-bottom:4px}

/* ===== Lists & cards ===== */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:0;display:flex;justify-content:flex-start;align-items:stretch;gap:0;overflow:hidden;transition:transform .12s,border-color .15s;text-align:left;width:100%;color:inherit;font-family:inherit;font-weight:inherit;letter-spacing:inherit;cursor:pointer}
.card:active{transform:scale(.985);border-color:var(--line-strong)}
.card .card-body{flex:1;min-width:0;padding:14px;display:flex;flex-direction:column;justify-content:center}
.card .card-arrow{padding:0 14px;display:flex;align-items:center}
/* legacy padding for cards without thumb (ingredients) */
.card:not(:has(.card-thumb)) .card-body{padding-left:16px}
.card .card-title{font-family:var(--font-display);font-size:22px;color:var(--cream);letter-spacing:.03em;text-transform:uppercase;line-height:1.05;margin-bottom:4px}
.card .card-meta{font-size:12px;color:var(--cyan);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.card .card-arrow{color:var(--cyan);font-size:20px;flex-shrink:0}
.card .card-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 8px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;border-radius:4px;background:rgba(102,197,219,.15);color:var(--cyan)}
.tag.gold{background:rgba(228,162,9,.18);color:var(--gold)}
.tag.halal{background:rgba(123,196,127,.18);color:var(--success)}

/* ===== Empty state ===== */
.empty{text-align:center;padding:48px 16px;color:var(--cream-dim)}
.empty .empty-ico{font-size:48px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:13px;letter-spacing:.15em;text-transform:uppercase;transition:transform .12s,opacity .15s;border:1px solid transparent}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--gold);color:var(--dark)}
.btn-secondary{background:transparent;color:var(--cyan);border-color:var(--cyan)}
.btn-ghost{background:rgba(255,241,205,.06);color:var(--cream)}
.btn-danger{background:transparent;color:var(--danger);border-color:rgba(228,90,64,.4)}
.btn-block{width:100%}
.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:0}

.fab{position:fixed;right:18px;bottom:calc(var(--safe-bot) + 88px);width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--dark);font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(228,162,9,.35);z-index:55;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ===== Recipe detail ===== */
.recipe-hero{background:var(--navy);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
.recipe-hero h2{font-family:var(--font-display);font-size:34px;color:var(--gold);letter-spacing:.04em;text-transform:uppercase;line-height:1;margin-bottom:6px}
.recipe-hero .cat{color:var(--cyan);font-size:11px;letter-spacing:.25em;text-transform:uppercase;font-weight:600}

.scaler{background:var(--dark-2);border:1px solid var(--line-strong);border-radius:10px;padding:14px;margin-top:14px}
.scaler-label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan);font-weight:600;margin-bottom:8px}
.scaler-row{display:flex;align-items:center;gap:10px}
.scaler-row .scaler-name{flex:1;font-family:var(--font-display);font-size:22px;color:var(--cream);text-transform:uppercase;letter-spacing:.03em}
.scaler-input{display:flex;align-items:center;background:var(--dark);border:1px solid var(--gold);border-radius:6px;overflow:hidden}
.scaler-input button{padding:8px 12px;color:var(--gold);font-size:18px;font-weight:600;line-height:1}
.scaler-input button:active{background:rgba(228,162,9,.15)}
.scaler-input input{width:70px;border:none;background:transparent;text-align:center;padding:8px 4px;font-family:var(--font-display);font-size:20px;color:var(--gold);letter-spacing:.04em}
.scaler-input .unit{padding:0 12px 0 0;color:var(--gold);font-size:14px;font-weight:600;text-transform:uppercase}
.scaler-multi{margin-top:8px;font-size:11px;color:var(--cream-dim);letter-spacing:.1em;text-transform:uppercase}
.scaler-multi b{color:var(--gold);font-weight:600}

.section-block{margin-top:22px}
.section-block .block-title{font-family:var(--font-display);font-size:20px;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

.ing-list{display:flex;flex-direction:column;gap:0}
.ing-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
.ing-row:last-child{border-bottom:none}
.ing-name{flex:1;color:var(--cream);font-size:15px;font-weight:500}
.ing-amount{font-family:var(--font-display);font-size:20px;color:var(--gold);letter-spacing:.04em;white-space:nowrap}
.ing-amount .unit{font-size:12px;color:var(--cyan);margin-left:3px;font-family:var(--font-body);font-weight:600}
.ing-amount.faded{color:var(--cream-dim)}

.cooking-info{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.cooking-pill{background:rgba(228,162,9,.12);border:1px solid rgba(228,162,9,.3);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.cooking-pill .lbl{font-size:10px;color:var(--cyan);letter-spacing:.2em;text-transform:uppercase;font-weight:600}
.cooking-pill .val{font-family:var(--font-display);font-size:20px;color:var(--gold);letter-spacing:.04em}

.instructions{background:var(--dark-2);border-left:3px solid var(--cyan);padding:14px 16px;border-radius:0 8px 8px 0;white-space:pre-wrap;line-height:1.6;color:var(--cream);font-size:14px}
.notes{background:rgba(228,162,9,.07);border-left:3px solid var(--gold);padding:14px 16px;border-radius:0 8px 8px 0;white-space:pre-wrap;line-height:1.6;color:var(--cream);font-size:14px;font-style:italic}

/* ===== Forms ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);font-weight:600;margin-bottom:6px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.dynamic-list{display:flex;flex-direction:column;gap:8px}
.dynamic-item{display:flex;gap:6px;align-items:center;background:var(--navy-2);border:1px solid var(--line);border-radius:8px;padding:8px}
.dynamic-item input{padding:8px 10px;font-size:14px}
.dynamic-item .ing-name-i{flex:2}
.dynamic-item .ing-amt-i{flex:1;min-width:60px}
.dynamic-item .ing-unit-i{flex:1;min-width:60px}
.dynamic-item .rm{width:32px;height:32px;border-radius:50%;background:rgba(228,90,64,.18);color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.add-btn{margin-top:6px;padding:10px;border:1px dashed var(--line-strong);border-radius:8px;color:var(--cyan);font-size:12px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;width:100%}
.add-btn:active{background:rgba(102,197,219,.08)}
.toggle{display:flex;align-items:center;justify-content:space-between;background:var(--navy);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:8px}
.toggle-label{font-size:13px;color:var(--cream);font-weight:500;letter-spacing:.05em}
.toggle-switch{width:44px;height:24px;background:var(--dark-2);border-radius:12px;position:relative;transition:background .2s;flex-shrink:0;border:1px solid var(--line)}
.toggle-switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--cream-dim);transition:transform .2s,background .2s}
.toggle-switch.on{background:var(--gold);border-color:var(--gold)}
.toggle-switch.on::after{transform:translateX(20px);background:var(--dark)}

/* ===== Tasks ===== */
.task-tabs{display:flex;background:var(--dark-2);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px}
.task-tabs button{flex:1;padding:10px;border-radius:7px;color:var(--cream-dim);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .15s}
.task-tabs button.active{background:var(--gold);color:var(--dark)}
.task-row{display:flex;align-items:center;gap:12px;background:var(--navy);border:1px solid var(--line);border-radius:8px;padding:14px}
.task-row.done{opacity:.5}
.task-row.done .task-title{text-decoration:line-through}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);font-size:14px;font-weight:bold;transition:all .15s}
.task-row.done .task-check{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.task-body{flex:1;min-width:0}
.task-title{font-size:15px;color:var(--cream);font-weight:500;line-height:1.3}
.task-meta{font-size:10px;color:var(--cyan);letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-top:3px}
.task-del{color:var(--danger);font-size:18px;padding:4px 8px;opacity:.5}
.task-del:active{opacity:1}
.task-edit{color:var(--cyan);font-size:16px;padding:4px 8px;opacity:.6}
.task-edit:active{opacity:1}

/* Drag-to-reorder */
.drag-pressing{
  background:rgba(102,197,219,.12) !important;
  box-shadow:0 0 0 1px rgba(102,197,219,.4) inset;
  transition:background .15s,box-shadow .15s;
}
.drag-active{
  opacity:.96;
  box-shadow:0 14px 36px rgba(0,0,0,.6),0 0 0 2px var(--cyan);
  transform-origin:center;
  z-index:1000;
  cursor:grabbing;
  -webkit-user-select:none;user-select:none;
}
.drag-placeholder{
  background:rgba(102,197,219,.06);
  border:1px dashed rgba(102,197,219,.45);
  border-radius:10px;
  margin-bottom:10px;
  animation:placeholderPulse 1.5s ease-in-out infinite;
}
.routine-items .drag-placeholder{
  border-radius:6px;
  margin:6px 0;
  border-style:dashed;
  background:rgba(102,197,219,.08);
}
@keyframes placeholderPulse{
  0%,100%{opacity:.6}50%{opacity:1}
}
.task-row,.routine-item,.routine-section{
  touch-action:pan-y;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
.task-row *,.routine-item *,.routine-section .rs-title-row *{
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
.rs-title-row{
  cursor:grab;
}
.rs-title-row:active{
  cursor:grabbing;
}
.routine-sections{
  position:relative;
}
.routine-items{
  position:relative;
}
.routine-section{
  position:relative;
}
/* Routine title row layout */
.routine-section .rs-title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line);padding-right:8px}
.routine-section .rs-title-row .rs-title-text{flex:1;font-family:var(--font-display);font-size:18px;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase}
.routine-section .rs-title-row .rs-count{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.1em}
/* Visual hint that section title is draggable */
.routine-section .rs-title-text::before{
  content:"⋮⋮ ";
  color:var(--cream-faint);
  font-weight:normal;
  letter-spacing:-2px;
  margin-right:2px;
  opacity:.5;
}

/* ===== Fiche ===== */
.fiche-section{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.fiche-section .fs-title{font-family:var(--font-display);font-size:18px;color:var(--gold);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.fiche-section ul{list-style:none;padding:0}
.fiche-section li{padding:6px 0;color:var(--cream);font-size:14px;border-bottom:1px dashed var(--line)}
.fiche-section li:last-child{border-bottom:none}
.fiche-section li::before{content:"▸ ";color:var(--cyan);margin-right:4px}
.variant-card{background:var(--dark-2);border-left:3px solid var(--gold);padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0}
.variant-card .vc-title{font-family:var(--font-display);font-size:16px;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.variant-card .vc-desc{font-size:13px;color:var(--cream);line-height:1.4}
.linked-recipe{display:flex;align-items:center;gap:10px;background:rgba(228,162,9,.08);border:1px solid rgba(228,162,9,.25);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;color:var(--cream)}
.linked-recipe::before{content:"⌁";color:var(--gold);font-size:18px}
.linked-recipe .lr-arrow{margin-left:auto;color:var(--cyan)}

/* ===== Settings ===== */
.settings-group{margin-bottom:24px}
.settings-group .sg-head{font-family:var(--font-display);font-size:18px;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.danger-zone{margin-top:32px;padding:14px;border:1px dashed rgba(228,90,64,.3);border-radius:10px}
.danger-zone .dz-head{color:var(--danger);font-size:11px;letter-spacing:.25em;text-transform:uppercase;font-weight:600;margin-bottom:8px}

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(15,17,22,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--navy);border-top:2px solid var(--gold);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:20px;padding-bottom:calc(20px + var(--safe-bot));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px)}to{transform:none}}
.modal h3{font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}

/* ===== Toast ===== */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 96px);left:50%;transform:translateX(-50%);background:var(--gold);color:var(--dark);padding:10px 20px;border-radius:24px;font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:toastIn .25s ease}

/* ===== Misc ===== */
.divider{height:1px;background:var(--line);margin:18px 0}
.muted{color:var(--cream-dim);font-size:12px}
.text-center{text-align:center}
.kbd{display:inline-block;padding:1px 6px;background:var(--dark-2);border:1px solid var(--line);border-radius:4px;font-size:11px;color:var(--cyan);font-family:monospace}

.photo-empty{height:120px;background:var(--dark-2);border:1px dashed var(--line-strong);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--cream-faint);font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:12px}
.photo-empty:active{background:rgba(102,197,219,.05)}
.photo-preview{position:relative;border-radius:8px;overflow:hidden;margin-bottom:12px}
.photo-preview img{width:100%;height:200px;object-fit:cover;display:block}
.photo-preview .photo-actions{position:absolute;top:8px;right:8px;display:flex;gap:6px}
.photo-preview button{width:34px;height:34px;border-radius:50%;background:rgba(15,17,22,.85);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:16px;backdrop-filter:blur(8px)}
.card-thumb{width:80px;height:80px;background:var(--dark-2) center/cover no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--cream-faint);border-right:1px solid var(--line)}

/* Spice rows */
.ing-row.spice .ing-name{color:var(--cream-dim);font-style:italic}
.dynamic-item.spice-row{border-color:rgba(228,162,9,.3);background:rgba(228,162,9,.04)}

/* Components / kcal */
.comp-table{background:var(--navy);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px}
.comp-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);gap:10px}
.comp-row:last-child{border-bottom:none}
.comp-row.total{background:rgba(228,162,9,.1);border-bottom:none;border-top:2px solid var(--gold)}
.comp-row .comp-name{flex:1;min-width:0;color:var(--cream);font-size:14px;font-weight:500}
.comp-row .comp-name .comp-tag{display:inline-block;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan);margin-right:6px;background:rgba(102,197,219,.1);padding:1px 5px;border-radius:3px;vertical-align:middle}
.comp-row .comp-name.recipe-link{color:var(--cyan);cursor:pointer}
.comp-row .comp-amt{font-family:var(--font-display);font-size:16px;color:var(--gold);letter-spacing:.03em;white-space:nowrap}
.comp-row .comp-amt .unit{font-family:var(--font-body);font-weight:600;font-size:11px;color:var(--cream-dim);margin-left:2px}
.comp-row .comp-kcal{font-size:13px;color:var(--cream-dim);font-weight:600;white-space:nowrap;min-width:60px;text-align:right}
.comp-row.total .comp-name{font-family:var(--font-display);font-size:18px;color:var(--gold);text-transform:uppercase;letter-spacing:.04em}
.comp-row.total .comp-kcal{font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:.04em}
.kcal-empty{padding:14px;background:var(--dark-2);border:1px dashed var(--line);border-radius:8px;text-align:center;color:var(--cream-faint);font-size:12px;letter-spacing:.1em;text-transform:uppercase}

/* Top tab (tasks/routines) */
.toptab{display:flex;background:var(--dark-2);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px}
.toptab button{flex:1;padding:10px;border-radius:7px;color:var(--cream-dim);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .15s}
.toptab button.active{background:var(--gold);color:var(--dark)}

/* Routines */
.routine-card{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%;text-align:left}

.routine-card .rc-body{flex:1;min-width:0}
.routine-card .rc-title{font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:.04em;text-transform:uppercase;line-height:1.05}
.routine-card .rc-sub{font-size:11px;color:var(--cyan);letter-spacing:.2em;text-transform:uppercase;font-weight:600;margin-top:3px}
.routine-card .rc-progress{font-size:12px;color:var(--cream);font-weight:600;margin-top:4px}
.progressbar{height:4px;background:var(--dark-2);border-radius:2px;margin-top:6px;overflow:hidden}
.progressbar-fill{height:100%;background:var(--gold);transition:width .3s}
.routine-section{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.routine-section .rs-title{font-family:var(--font-display);font-size:18px;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}

.routine-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
.routine-item:last-child{border-bottom:none}
.routine-item .ri-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--cyan);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:bold;font-size:13px;cursor:pointer;transition:all .15s;margin-top:1px}
.routine-item.done .ri-check{background:var(--gold);border-color:var(--gold);color:var(--dark)}

/* Cooking pill cyan variant */
.cooking-pill.cyan{background:rgba(102,197,219,.1);border-color:rgba(102,197,219,.3)}

.cooking-pill{flex-direction:column;gap:1px;padding:6px 10px}
.cooking-pill .lbl{font-size:9px}
.cooking-pill .val{font-size:18px;line-height:1}

/* Tile wide for home routines */
.tile.wide{grid-column:1/-1;aspect-ratio:auto;flex-direction:row;align-items:center;gap:16px}
.tile.wide .tile-ico{font-size:30px}
.tile.wide .tile-info{flex:1}

/* Cuisine tabs (segmented) */
.seg-tabs{display:flex;background:var(--dark-2);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}

/* Search input */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{
  width:100%;
  padding:11px 38px 11px 36px;
  background:var(--navy);
  border:1px solid var(--line);
  border-radius:10px;
  color:var(--cream);
  font-family:var(--font-body);
  font-size:14px;
  letter-spacing:.02em;
  box-sizing:border-box;
}
.search-input:focus{outline:none;border-color:var(--cyan);background:var(--navy-2)}
.search-input::placeholder{color:var(--cream-faint);opacity:.6}
.search-wrap::before{
  content:"🔍";
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  opacity:.5;
  pointer-events:none;
}
.search-clear{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(102,197,219,.1);
  color:var(--cyan);
  width:26px;
  height:26px;
  border-radius:50%;
  font-size:14px;
  line-height:1;
  display:none;
  align-items:center;
  justify-content:center;
}
.search-clear.visible{display:flex}
.search-empty{
  padding:30px 16px;
  text-align:center;
  color:var(--cream-faint);
  font-size:13px;
  display:none;
  font-style:italic;
}
.search-empty.visible{display:block}
.diet-chip{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;background:var(--dark-2);border:1px solid var(--line);border-radius:20px;font-size:12px;color:var(--cream-dim);cursor:pointer;user-select:none;transition:all .15s}
.diet-chip input{display:none}
.diet-chip:has(input:checked){background:var(--cyan);color:var(--dark);border-color:var(--cyan);font-weight:600}
.diet-chip.allergen:has(input:checked){background:var(--danger);color:#fff;border-color:var(--danger)}
.resto-bar{margin:0 0 18px;padding:14px 16px;background:var(--navy-2);border:1px solid var(--line);border-radius:14px}
.resto-bar-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:8px;font-weight:700}
.resto-pills{display:flex;flex-wrap:wrap;gap:8px}
.resto-pill{padding:9px 14px;border-radius:20px;background:var(--dark-2);border:1px solid var(--line);color:var(--cream-dim);font-size:13px;font-weight:600;transition:all .15s}
.resto-pill.on{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.bulk-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.bulk-bar.on{background:var(--navy-2);border:1px solid var(--line-strong);border-radius:10px;padding:8px 12px}
.bulk-btn{padding:8px 14px;border-radius:8px;background:var(--dark-2);border:1px solid var(--line);color:var(--cyan);font-size:12px;font-weight:600;letter-spacing:.06em}
.bulk-btn.ghost{color:var(--cream-faint)}
.bulk-count{flex:1;font-size:12px;color:var(--cream-dim);text-align:center}
.bulk-check{position:absolute;top:8px;left:8px;width:26px;height:26px;border-radius:50%;border:2px solid var(--cyan);background:rgba(15,17,22,.7);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:14px;font-weight:700;z-index:5}
.bulk-check.on{background:var(--cyan);color:var(--dark)}
.bulk-actionbar{position:fixed;left:0;right:0;bottom:0;z-index:60;padding:12px 16px calc(12px + var(--safe-bot));background:linear-gradient(180deg,transparent,var(--dark) 30%);pointer-events:none}
.bulk-actionbar-inner{pointer-events:auto;max-width:560px;margin:0 auto;background:var(--navy);border:1px solid var(--gold);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.bulk-actionbar-inner>span{font-size:13px;font-weight:600;color:var(--cream)}
.bulk-acts{display:flex;gap:8px;flex-wrap:wrap}
.bulk-act{padding:10px 14px;border-radius:9px;background:var(--gold);color:var(--dark);font-size:13px;font-weight:700;letter-spacing:.03em}
.bulk-act+.bulk-act{background:var(--cyan)}
.card,.task-row,.stock-row,.routine-card{position:relative}
.seg-tabs::-webkit-scrollbar{display:none}
.seg-tabs button{flex:1;min-width:max-content;padding:10px 14px;border-radius:7px;color:var(--cream-dim);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .15s;white-space:nowrap}
.seg-tabs button.active{background:var(--cyan);color:var(--dark)}
.seg-tabs button.gold.active{background:var(--gold);color:var(--dark)}

/* Type chip on cards */
.tag.type{background:rgba(228,162,9,.12);color:var(--gold)}
.tag.cuisine-burger{background:rgba(228,90,64,.18);color:var(--danger)}
.tag.cuisine-mexicain{background:rgba(228,162,9,.18);color:var(--gold)}

/* Stock list */
.stock-row{background:var(--navy);border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.stock-row.tobuy{border-color:rgba(228,90,64,.4);background:rgba(228,90,64,.06)}
.stock-row .stock-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--cyan);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:bold;font-size:13px;cursor:pointer;transition:all .15s}
.stock-row.tobuy .stock-check{background:var(--danger);border-color:var(--danger);color:var(--cream)}
.stock-row .stock-body{flex:1;min-width:0}
.stock-row .stock-name{font-size:14px;color:var(--cream);font-weight:500;line-height:1.2}
.stock-row .stock-qty{font-family:var(--font-display);font-size:18px;color:var(--gold);letter-spacing:.04em;line-height:1;margin-top:3px}
.stock-row .stock-qty .unit{font-family:var(--font-body);font-size:11px;color:var(--cream-dim);font-weight:600;margin-left:2px}
.stock-row .stock-qty.zero{color:var(--danger)}
.stock-row .stock-note{font-size:11px;color:var(--cream-dim);margin-top:2px;font-style:italic}
.stock-row .stock-edit{color:var(--cyan);font-size:18px;padding:6px 8px;cursor:pointer}
.stock-row .stock-del{color:var(--danger);font-size:18px;padding:4px 8px;opacity:.5;cursor:pointer}
.stock-row .stock-del:active{opacity:1}

/* Reorder buttons in dynamic list */
.dynamic-item .reorder{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.dynamic-item .reorder button{width:24px;height:18px;background:rgba(102,197,219,.1);color:var(--cyan);font-size:11px;border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1}
.dynamic-item .reorder button:active{background:rgba(102,197,219,.25)}
.dynamic-item .reorder button:disabled{opacity:.25;cursor:not-allowed}

/* Sync status */
.sync-status{font-size:12px;letter-spacing:.05em;padding:8px 12px;background:var(--dark-2);border-radius:6px;margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Type chip on form */
.type-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.type-pill{padding:6px 12px;border-radius:16px;background:var(--dark-2);border:1px solid var(--line);color:var(--cream-dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:all .15s}
.type-pill.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.type-pill.cuisine.active{background:var(--cyan);color:var(--dark);border-color:var(--cyan)}

<body>
<div id="app"></div>

<script>
/* ============================================================
   RESTO TOOL — single file app
   ============================================================ */

/* ---------- Storage layer (artifact / localStorage / memory + GitHub sync) ---------- */
const STORAGE_KEY = 'restoTool_v3';
const THEME_KEY = 'restoTool_theme';
const THEMES = [
  {key:'retro', label:'Futuriste Rétro', desc:"Le style d'origine (navy / cyan / or)"},
  {key:'sombre', label:'Sombre', desc:'Noir profond, accents froids, minimal'},
  {key:'classique', label:'Classique', desc:'Clair et sobre, type fiche papier'}
];
function applyTheme(t){
  let theme = t;
  if(!theme){ try{ theme = localStorage.getItem(THEME_KEY); }catch(e){} }
  theme = theme || 'retro';
  const html = document.documentElement;
  if(theme === 'retro') html.removeAttribute('data-theme');
  else html.setAttribute('data-theme', theme);
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
applyTheme();
const SYNC_CONFIG_KEY = 'restoTool_syncConfig';
const memStore = {};

// Allergen catalogue (EU 14 + common extras)
const ALLERGENS = [
  {key:'gluten', icon:'🌾', label:'Gluten'},
  {key:'lactose', icon:'🥛', label:'Lactose'},
  {key:'caseine', icon:'🧀', label:'Caséine'},
  {key:'oeuf', icon:'🥚', label:'Œuf'},
  {key:'arachide', icon:'🥜', label:'Arachide'},
  {key:'noix', icon:'🌰', label:'Fruits à coque'},
  {key:'soja', icon:'🫘', label:'Soja'},
  {key:'poisson', icon:'🐟', label:'Poisson'},
  {key:'crustaces', icon:'🦐', label:'Crustacés'},
  {key:'mollusques', icon:'🦪', label:'Mollusques'},
  {key:'celeri', icon:'🥬', label:'Céleri'},
  {key:'moutarde', icon:'🟡', label:'Moutarde'},
  {key:'sesame', icon:'⚪', label:'Sésame'},
  {key:'sulfites', icon:'🍷', label:'Sulfites'},
  {key:'lupin', icon:'🌼', label:'Lupin'}
];

// Pre-filled defaults so colleagues only need to press "Start".
// NOTE: this token is embedded in a public GitHub Pages file. Acceptable only
// Pre-filled defaults so setup is quick. Token is intentionally NOT embedded
// (security: this file is public on GitHub Pages). The manager pastes it once
// per device via advanced settings (code 5254); it then persists locally.
const SYNC_DEFAULTS = {
  owner: 'Enguytv',
  repo: 'resto-data',
  path: 'resto-data.json',
  branch: 'main',
  token: '',
  auto: true,
  _tokenVersion: 3
};

const SyncConfig = {
  load(){
    try{ const v = localStorage.getItem(SYNC_CONFIG_KEY); if(v) return JSON.parse(v); }catch(e){}
    return null;
  },
  // Returns saved config OR the prefilled defaults.
  // If a NEW non-empty embedded token is shipped (bumped _tokenVersion), it
  // replaces stale saved tokens. If the embedded token is empty, we keep
  // whatever token the user already saved locally.
  loadOrDefaults(){
    const saved = this.load();
    if(saved && saved.token && saved.owner && saved.repo){
      if(SYNC_DEFAULTS.token && saved._tokenVersion !== SYNC_DEFAULTS._tokenVersion){
        saved.token = SYNC_DEFAULTS.token;
        saved.owner = saved.owner || SYNC_DEFAULTS.owner;
        saved.repo  = saved.repo  || SYNC_DEFAULTS.repo;
        saved._tokenVersion = SYNC_DEFAULTS._tokenVersion;
        this.save(saved);
      }
      return saved;
    }
    return Object.assign({}, SYNC_DEFAULTS);
  },
  save(cfg){
    try{ localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg)); }catch(e){}
  },
  clear(){ try{ localStorage.removeItem(SYNC_CONFIG_KEY); }catch(e){} }
};

const GitHubSync = {
  async fetchFile(cfg, path, etag){
    path = path || cfg.path || LIBRARY_FILE;
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}?ref=${encodeURIComponent(cfg.branch||'main')}`;
    const headers = { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' };
    if(etag) headers['If-None-Match'] = etag;
    const r = await fetch(url, { headers });
    if(r.status===304) return { notModified:true };
    if(r.status===404) return { exists:false };
    if(!r.ok) throw new Error('GitHub fetch HTTP '+r.status);
    const j = await r.json();
    const bytes = atob(j.content.replace(/\n/g,''));
    const text = decodeURIComponent(escape(bytes));
    let data = null;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('Fichier corrompu sur GitHub'); }
    return { exists:true, data, sha: j.sha, etag: r.headers.get('ETag') };
  },
  async putFile(cfg, dataObj, sha, path){
    path = path || cfg.path || LIBRARY_FILE;
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const text = JSON.stringify(dataObj, null, 2);
    const bytes = unescape(encodeURIComponent(text));
    let b64 = '';
    try{ b64 = btoa(bytes); }catch(e){ throw new Error('Encodage base64 impossible'); }
    const body = { message: 'Resto Tool sync '+path+' '+ new Date().toISOString(), content: b64, branch: cfg.branch || 'main' };
    if(sha) body.sha = sha;
    const r = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if(!r.ok){
      const err = await r.json().catch(()=>({}));
      const e = new Error('GitHub push: '+(err.message||r.status));
      e.status = r.status;
      throw e;
    }
    const j = await r.json();
    return { sha: j.content.sha };
  },
  async test(cfg){
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}`;
    const r = await fetch(url, { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }});
    if(r.status===401) throw new Error('Token invalide');
    if(r.status===404) throw new Error('Repo introuvable');
    if(!r.ok) throw new Error('HTTP '+r.status);
    return true;
  }
};

function splitState(){
  // Returns { library, shared }
  const library = {
    version: 4,
    schema: 'library',
    restaurants: state.restaurants || [],
    recipes: state.recipes || [],
    fiches: state.fiches || [],
    ingredients: state.ingredients || [],
    tasks: (state.tasks||[]).map(t => {
      const { done, lastDone, ...def } = t;
      return def;
    }),
    routines: (state.routines||[]).map(r => {
      const { checked, ...def } = r;
      return def;
    }),
    settings: state.settings || {},
    updatedAt: Date.now()
  };
  const shared = {
    version: 4,
    schema: 'shared',
    stock: state.stock || [],
    prep: state.prep || {},
    taskDone: {},
    routineChecked: {},
    devices: state._devices || {},
    updatedAt: Date.now()
  };
  // Stamp/refresh this device's own entry
  const did = getDeviceId();
  shared.devices[did] = {
    name: getDeviceName(),
    role: getRole(),
    lastSeen: Date.now(),
    ua: (navigator.userAgent||'').slice(0,80)
  };
  state._devices = shared.devices;
  (state.tasks||[]).forEach(t => { if(t.done) shared.taskDone[t.id] = true; });
  (state.routines||[]).forEach(r => {
    if(r.checked && Object.keys(r.checked).length){
      shared.routineChecked[r.id] = r.checked;
    }
  });
  return { library, shared };
}

function getDeviceId(){
  let id;
  try{ id = localStorage.getItem('restoTool_deviceId'); }catch(e){}
  if(!id){
    id = 'dev_' + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
    try{ localStorage.setItem('restoTool_deviceId', id); }catch(e){}
  }
  return id;
}
function getDeviceName(){
  let n;
  try{ n = localStorage.getItem('restoTool_deviceName'); }catch(e){}
  if(n) return n;
  // Auto guess from UA
  const ua = navigator.userAgent||'';
  if(/iphone/i.test(ua)) return 'iPhone';
  if(/ipad/i.test(ua)) return 'iPad';
  if(/android/i.test(ua)) return 'Android';
  if(/mac/i.test(ua)) return 'Mac';
  if(/windows/i.test(ua)) return 'PC Windows';
  return 'Appareil';
}
function setDeviceName(n){
  try{ localStorage.setItem('restoTool_deviceName', n); }catch(e){}
}

function applyLibraryFromCloud(lib){
  if(!lib) return;
  if(lib.restaurants && lib.restaurants.length) state.restaurants = lib.restaurants;
  state.recipes = lib.recipes || [];
  state.fiches = lib.fiches || [];
  state.ingredients = lib.ingredients || [];
  state.settings = Object.assign(state.settings||{}, lib.settings||{});
  // Tasks: replace definitions, preserve local done state by id
  const preservedDone = {};
  (state.tasks||[]).forEach(t => { if(t.done) preservedDone[t.id] = true; });
  state.tasks = (lib.tasks||[]).map(t => ({
    ...t,
    done: !!preservedDone[t.id]
  }));
  // Routines: replace definitions, preserve checked state by id
  const preservedChecked = {};
  (state.routines||[]).forEach(r => { preservedChecked[r.id] = r.checked||{}; });
  state.routines = (lib.routines||[]).map(r => ({
    ...r,
    checked: preservedChecked[r.id] || {}
  }));
}

function applySharedFromCloud(sh){
  if(!sh) return;
  state.stock = sh.stock || [];
  state.prep = sh.prep || {};
  // Merge device registry: keep the most recent lastSeen per device id
  const incoming = sh.devices || {};
  const merged = Object.assign({}, state._devices || {});
  Object.keys(incoming).forEach(id=>{
    if(!merged[id] || (incoming[id].lastSeen||0) > (merged[id].lastSeen||0)){
      merged[id] = incoming[id];
    }
  });
  state._devices = merged;
  if(sh.taskDone){
    (state.tasks||[]).forEach(t => { t.done = !!sh.taskDone[t.id]; });
  }
  if(sh.routineChecked){
    (state.routines||[]).forEach(r => {
      if(sh.routineChecked[r.id]) r.checked = sh.routineChecked[r.id];
    });
  }
}

  const arr = bulkArrayFor(kind);
  $$(`[data-bulk-all="${kind}"]`).forEach(b=>b.addEventListener('click',()=>{
    filterByResto(arr).forEach(it=>bulkSelected.add(it.id)); render();

  $$(`[data-bulk-none="${kind}"]`).forEach(b=>b.addEventListener('click',()=>{
    bulkSelected.clear(); render();
  }));
  $$('[data-bulk-pick]').forEach(el=>el.addEventListener('click',(e)=>{
    e.stopPropagation(); e.preventDefault();
    const id = el.getAttribute('data-bulk-pick');
    if(bulkSelected.has(id)) bulkSelected.delete(id); else bulkSelected.add(id);

}

const Storage = {
  async load(){
    try{
      if(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'){
        const r = await window.storage.get(STORAGE_KEY);
        if(r && r.value){ return JSON.parse(r.value); }
      }
    }catch(e){}
    try{ const v = localStorage.getItem(STORAGE_KEY); if(v) return JSON.parse(v); }catch(e){}
    if(memStore[STORAGE_KEY]) return memStore[STORAGE_KEY];
    return null;
  },
  async save(data){
    const json = JSON.stringify(data);
    let saved = false;
    try{
      if(typeof window!=='undefined' && window.storage && typeof window.storage.set==='function'){
        await window.storage.set(STORAGE_KEY, json);
        saved = true;
      }
    }catch(e){}
    if(!saved){
      try{ localStorage.setItem(STORAGE_KEY, json); saved=true; }
      catch(e){
        if(e && e.name === 'QuotaExceededError') alert('⚠️ Stockage local plein.');
        throw e;
      }
    }
    if(!saved){ memStore[STORAGE_KEY] = data; }
    const cfg = SyncConfig.loadOrDefaults();
    if(cfg && cfg.token && cfg.owner && cfg.repo && cfg.auto){
      if(_pushTimer) clearTimeout(_pushTimer);
      _pushTimer = setTimeout(()=>autoPushIfDirty(), 2000);
    }
  },
  async clear(){
    try{ if(window.storage) await window.storage.delete(STORAGE_KEY); }catch(e){}
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
    delete memStore[STORAGE_KEY];
  }
};

async function cloudPull(silent){
  const cfg = SyncConfig.loadOrDefaults();
  if(!cfg || !cfg.token){ if(!silent) toast('Sync non configurée'); return false; }
  _syncStatus = 'syncing'; updateSyncStatusUI();
  try{
    // Fetch both files
    const [libRes, sharedRes] = await Promise.all([
      GitHubSync.fetchFile(cfg, LIBRARY_FILE).catch(e=>({error:e})),
      GitHubSync.fetchFile(cfg, SHARED_FILE).catch(e=>({error:e}))
    ]);
    if(libRes.error && sharedRes.error) throw libRes.error;

    let libData = null;
    if(libRes.exists){
      libData = libRes.data;
      _libSha = libRes.sha;
      _libETag = libRes.etag;
    }
    let sharedData = null;
    if(sharedRes.exists){
      sharedData = sharedRes.data;
      _sharedSha = sharedRes.sha;
      _sharedETag = sharedRes.etag;
    }

    // Detect old single-file format on library path (pre-v4): full state in resto-data.json
    if(libData && libData.schema !== 'library'){
      // Old format: contains everything mashed together
      // Apply it wholesale as the state, but mark as "needs republish in new format"
      state = libData;
      ensureDefaults();
      _lastPushedLibHash = null; // force fresh push to upgrade format
      _lastPushedSharedHash = null;
    } else {
      if(libData) applyLibraryFromCloud(libData);
      if(sharedData) applySharedFromCloud(sharedData);
    }

    cfg.lastSync = Date.now();
    SyncConfig.save(cfg);
    // Save locally without retriggering push
    const oldAuto = cfg.auto;
    cfg.auto = false; SyncConfig.save(cfg);
    await Storage.save(state);
    cfg.auto = oldAuto; SyncConfig.save(cfg);
    // Mark current cloud state as "last pushed" so we don't push back immediately
    const split = splitState();
    _lastPushedLibHash = JSON.stringify(split.library);
    _lastPushedSharedHash = JSON.stringify(split.shared);
    _syncStatus = 'ok'; _syncError = '';
    if(!silent) toast('Données récupérées depuis GitHub');
    render();
    return true;
  }catch(err){
    _syncStatus = 'error'; _syncError = err.message || String(err);
    if(!silent) alert('Erreur de pull : '+_syncError);
    updateSyncStatusUI();
    return false;
  }
}

async function cloudPush(silent){
  // Manual full push: try both files according to role
  const cfg = SyncConfig.loadOrDefaults();
  if(!cfg || !cfg.token){ if(!silent) toast('Sync non configurée'); return false; }
  _syncStatus = 'syncing'; updateSyncStatusUI();
  try{
    const split = splitState();
    // Push library only if chef
    if(isChef()){
      if(!_libSha){
        try{
          const res = await GitHubSync.fetchFile(cfg, LIBRARY_FILE);
          if(res.exists){ _libSha = res.sha; _libETag = res.etag; }
        }catch(e){}
      }
      const lr = await GitHubSync.putFile(cfg, split.library, _libSha, LIBRARY_FILE);
      _libSha = lr.sha;
      _lastPushedLibHash = JSON.stringify(split.library);
    }
    // Push shared (everyone)
    if(!_sharedSha){
      try{
        const res = await GitHubSync.fetchFile(cfg, SHARED_FILE);
        if(res.exists){ _sharedSha = res.sha; _sharedETag = res.etag; }
      }catch(e){}
    }
    const sr = await GitHubSync.putFile(cfg, split.shared, _sharedSha, SHARED_FILE);
    _sharedSha = sr.sha;
    _lastPushedSharedHash = JSON.stringify(split.shared);

    cfg.lastSync = Date.now();
    SyncConfig.save(cfg);
    _syncStatus = 'ok'; _syncError = '';
    if(!silent){
      toast(isChef() ? 'Bibliothèque + état envoyés' : 'État partagé envoyé');
    }
    updateSyncStatusUI();
    return true;
  }catch(err){
    _syncStatus = 'error'; _syncError = err.message || String(err);
    if(err.status===403 && !isChef()){
      if(!silent) alert("Ton rôle 'Employé' n'autorise pas cette action. Bascule en 'Gestion' pour modifier la bibliothèque.");
    } else if(/sha/i.test(_syncError) || /409/.test(_syncError) || err.status===409 || err.status===422){
      // Conflict: refresh SHAs
      try{
        if(isChef()){
          const r1 = await GitHubSync.fetchFile(cfg, LIBRARY_FILE);
          if(r1.exists){ _libSha = r1.sha; _libETag = r1.etag; }
        }
        const r2 = await GitHubSync.fetchFile(cfg, SHARED_FILE);
        if(r2.exists){ _sharedSha = r2.sha; _sharedETag = r2.etag; }
        if(!silent) alert('Conflit détecté. Fais "Pull" pour fusionner, puis renouvelle ton "Push".');
      }catch(e){}
    } else if(!silent) alert('Erreur de push : '+_syncError);
    updateSyncStatusUI();
    return false;
  }
}

// Auto-push: only pushes what has changed since last push, respecting role
async function autoPushIfDirty(){
  const cfg = SyncConfig.loadOrDefaults();
  if(!cfg || !cfg.token || !cfg.owner || !cfg.repo) return;
  if(!cfg.auto) return;
  const split = splitState();
  const libHash = JSON.stringify(split.library);
  const sharedHash = JSON.stringify(split.shared);
  const libDirty = isChef() && libHash !== _lastPushedLibHash;
  const sharedDirty = sharedHash !== _lastPushedSharedHash;
  if(!libDirty && !sharedDirty) return;
  _syncStatus = 'syncing'; updateSyncStatusUI();
  try{
    if(libDirty){
      const lr = await GitHubSync.putFile(cfg, split.library, _libSha, LIBRARY_FILE);
      _libSha = lr.sha;
      _lastPushedLibHash = libHash;
    }
    if(sharedDirty){
      const sr = await GitHubSync.putFile(cfg, split.shared, _sharedSha, SHARED_FILE);
      _sharedSha = sr.sha;
      _lastPushedSharedHash = sharedHash;
    }
    cfg.lastSync = Date.now();
    SyncConfig.save(cfg);
    _syncStatus = 'ok'; _syncError = '';
    updateSyncStatusUI();
  }catch(err){
    _syncStatus = 'error'; _syncError = err.message || String(err);
    if(err.status===409 || err.status===422 || /sha/i.test(_syncError)){
      // Stale SHA: refresh and try once more
      try{
        const r2 = await GitHubSync.fetchFile(cfg, SHARED_FILE);
        if(r2.exists){ _sharedSha = r2.sha; _sharedETag = r2.etag; }
        if(isChef()){
          const r1 = await GitHubSync.fetchFile(cfg, LIBRARY_FILE);
          if(r1.exists){ _libSha = r1.sha; _libETag = r1.etag; }
        }
      }catch(e){}
    }
    updateSyncStatusUI();
  }
}

// Poll shared file (everyone) — and library if older than ~5 min (chef less often, service often)
async function pollSync(){
  const cfg = SyncConfig.loadOrDefaults();
  if(!cfg || !cfg.token || !cfg.owner || !cfg.repo) return;
  try{
    // Shared first (most frequent change)
    const r = await GitHubSync.fetchFile(cfg, SHARED_FILE, _sharedETag);
    if(r.notModified){ /* no change */ }
    else if(r.exists){
      _sharedSha = r.sha;
      _sharedETag = r.etag;
      // Apply only if it differs from what we last pushed
      const remoteHash = JSON.stringify(r.data);
      if(remoteHash !== _lastPushedSharedHash){
        applySharedFromCloud(r.data);
        _lastPushedSharedHash = JSON.stringify(splitState().shared);
        // Save locally without retriggering push
        const oldAuto = cfg.auto;
        cfg.auto = false; SyncConfig.save(cfg);
        await Storage.save(state);
        cfg.auto = oldAuto; SyncConfig.save(cfg);
        render();
      }
    }
    // Library: throttled - every ~5 polls (~2.5 min)
    if(!_libPollCount) _libPollCount = 0;
    _libPollCount++;
    if(_libPollCount >= 5){
      _libPollCount = 0;
      const rl = await GitHubSync.fetchFile(cfg, LIBRARY_FILE, _libETag);
      if(rl.notModified){ /* unchanged */ }
      else if(rl.exists && rl.data && rl.data.schema === 'library'){
        _libSha = rl.sha;
        _libETag = rl.etag;
        const remoteHash = JSON.stringify(rl.data);
        if(remoteHash !== _lastPushedLibHash){
          applyLibraryFromCloud(rl.data);
          _lastPushedLibHash = JSON.stringify(splitState().library);
          const oldAuto = cfg.auto;
          cfg.auto = false; SyncConfig.save(cfg);
          await Storage.save(state);
          cfg.auto = oldAuto; SyncConfig.save(cfg);
          render();
        }
      }
    }
    if(_syncStatus !== 'syncing'){ _syncStatus = 'ok'; _syncError = ''; }
    updateSyncStatusUI();
  }catch(err){
    // Don't alert on poll errors, just update status
    _syncStatus = 'error'; _syncError = (err.message||String(err));
    updateSyncStatusUI();
  }
}

let _libPollCount = 0;

function startPolling(){
  stopPolling();
  const cfg = SyncConfig.loadOrDefaults();
  if(!cfg || !cfg.token || !cfg.owner || !cfg.repo) return;
  _pollTimer = setInterval(()=>pollSync(), POLL_INTERVAL_MS);
}
function stopPolling(){
  if(_pollTimer){ clearInterval(_pollTimer); _pollTimer = null; }
}

function updateSyncStatusUI(){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  const cfg = SyncConfig.load();
  const role = getRole();
  const roleLabel = role==='service' ? '🛎 Employé' : '🍳 Gestion';
  if(!cfg || !cfg.token){
    el.textContent = 'Non configurée · '+roleLabel;
    el.style.color = 'var(--cream-faint)';
    return;
  }
  if(_syncStatus==='syncing'){
    el.innerHTML = '<span class="spinner"></span> Synchronisation… · '+roleLabel;
    el.style.color = 'var(--cyan)';
    return;
  }
  if(_syncStatus==='error'){
    el.textContent = '⚠ '+_syncError+' · '+roleLabel;
    el.style.color = 'var(--danger)';
    return;
  }
  const t = cfg.lastSync ? new Date(cfg.lastSync).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}) : '—';
  const polling = _pollTimer ? ' · 🟢 live' : '';
  el.textContent = '✓ Sync : '+t+polling+' · '+roleLabel;
  el.style.color = 'var(--success)';
}

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function $(sel,parent){ return (parent||document).querySelector(sel); }
function $$(sel,parent){ return Array.from((parent||document).querySelectorAll(sel)); }
function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

const SPICE_RX = /(sel|poivre|paprika|cumin|origan|thym|ail (en )?poudre|herbes|épice|tajin|miel|au goût)/i;
function isSpiceLike(name,unit){
  if(unit==='au goût') return true;
  return SPICE_RX.test(name||'');
}
function fmtMin(min){
  if(min==null) return null;
  if(min < 60) return `${min} min`;
  const h = Math.floor(min/60), m = min%60;
  return m===0 ? `${h}h` : `${h}h${m.toString().padStart(2,'0')}`;
}
function toGrams(amount,unit){
  if(amount==null || isNaN(amount) || amount<=0) return 0;
  if(!unit) return 0;
  const u = String(unit).toLowerCase().trim();
  if(u==='g') return amount;
  if(u==='kg') return amount*1000;
  if(u==='mg') return amount/1000;
  if(u==='ml') return amount;
  if(u==='cl') return amount*10;
  if(u==='l') return amount*1000;
  return 0;
}
function findIngredientByName(name){
  if(!name) return null;
  const n = name.toLowerCase().trim();
  let ing = state.ingredients.find(i => i.name.toLowerCase()===n);
  if(ing) return ing;
  ing = state.ingredients.find(i => n.includes(i.name.toLowerCase()) || i.name.toLowerCase().includes(n));
  return ing || null;
}
function recipeNutrition(recipe){
  let kcal=0, totalG=0;
  if(!recipe) return {kcal:0, totalG:0, kcalPerG:0};
  recipe.ingredients.forEach(ing=>{
    if(ing.unit==='au goût') return;
    const g = toGrams(ing.amount, ing.unit);
    if(!g) return;
    totalG += g;
    const dbIng = findIngredientByName(ing.name);
    if(dbIng && dbIng.kcal100) kcal += g * dbIng.kcal100 / 100;
  });
  return { kcal: Math.round(kcal), totalG: Math.round(totalG), kcalPerG: totalG > 0 ? kcal/totalG : 0 };
}
function ficheNutrition(fiche){
  let total=0;
  const breakdown = [];
  (fiche.components||[]).forEach(c=>{
    let kcalContribution = null;
    let label = c.label || '';
    if(c.type==='ingredient'){
      const ing = state.ingredients.find(i=>i.id===c.refId);
      if(ing){
        if(!label) label = ing.name;
        if(ing.kcal100){
          const g = toGrams(c.amount, c.unit);
          kcalContribution = g * ing.kcal100 / 100;
        }
      }
    } else if(c.type==='recipe'){
      const r = state.recipes.find(x=>x.id===c.refId);
      if(r){
        if(!label) label = r.name;
        const n = recipeNutrition(r);
        if(n.kcalPerG > 0){
          const g = toGrams(c.amount, c.unit);
          kcalContribution = g * n.kcalPerG;
        }
      }
    }
    breakdown.push({ type:c.type, refId:c.refId, label, amount:c.amount, unit:c.unit, kcal: kcalContribution!=null?Math.round(kcalContribution):null });
    if(kcalContribution!=null) total += kcalContribution;
  });
  return { total: Math.round(total), breakdown };
}
async function compressImage(file, maxDim=1000, quality=0.75){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height && width > maxDim){ height = Math.round(height * maxDim/width); width = maxDim; }
        else if(height >= width && height > maxDim){ width = Math.round(width * maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fmtAmount(n,unit){
  if(n===0||n==null) return unit==='au goût'?'<span class="ing-amount faded">au goût</span>':'<span class="ing-amount faded">—</span>';
  let v;
  if(n<1) v = (Math.round(n*1000)/1000).toString();
  else if(n<10) v = (Math.round(n*100)/100).toString();
  else if(n<100) v = (Math.round(n*10)/10).toString();
  else v = Math.round(n).toString();
  v = v.replace('.',',');
  return `<span class="ing-amount">${v}<span class="unit">${escHtml(unit||'')}</span></span>`;
}
function toast(msg){
  const ex = $('.toast'); if(ex) ex.remove();
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),250); },1800);
}

/* ---------- Router ---------- */
function navigate(hash){
  if(hash && hash.charAt(0)!=='#') hash='#'+hash;
  // Leaving a list cancels any active bulk-select session
  if(typeof bulkClear==='function') bulkClear();
  window.location.hash = hash || '#home';
}
function parseRoute(){
  const h = (window.location.hash || '#home').slice(1);
  const parts = h.split('/');
  return { path: parts[0]||'home', id: parts[1]||null, action: parts[2]||null };
}

/* ---------- Render dispatch ---------- */
let _lastRouteKey = null;
function render(){
  const route = parseRoute();
  const routeKey = `${route.path}|${route.id||''}|${route.action||''}`;
  const sameRoute = (routeKey === _lastRouteKey);
  const prevScroll = window.scrollY || window.pageYOffset || 0;
  currentRoute = window.location.hash || '#home';
  const root = $('#app');
  let html = '';
  switch(route.path){
    case 'home': html = renderHome(); break;
    case 'recipes': html = renderRecipesList(); break;
    case 'recipe':
      if(route.action==='edit') html = renderRecipeEdit(route.id);
      else if(route.id==='new') html = renderRecipeEdit(null);
      else html = renderRecipeDetail(route.id);
      break;
    case 'fiches': html = renderFichesList(); break;
    case 'fiche':
      if(route.action==='edit') html = renderFicheEdit(route.id);
      else if(route.id==='new') html = renderFicheEdit(null);
      else html = renderFicheDetail(route.id);
      break;
    case 'tasks': html = renderTasks(); break;
    case 'routine':
      if(route.action==='edit') html = renderRoutineEdit(route.id);
      else if(route.id==='new') html = renderRoutineEdit(null);
      else html = renderRoutineDetail(route.id);
      break;
    case 'ingredients': html = renderIngredients(); break;
    case 'ingredient':
      if(route.action==='edit') html = renderIngredientEdit(route.id);
      else if(route.id==='new') html = renderIngredientEdit(null);
      else html = renderIngredientEdit(route.id);
      break;
    case 'stock':
      if(route.id && route.action==='edit') html = renderStockEdit(route.id);
      else html = renderStock();
      break;
    case 'settings': html = renderSettings(); break;
    default: html = renderHome();
  }
  root.innerHTML = html + renderBottomNav(route.path);
  const dl = document.getElementById('ingredients-datalist');
  if(dl){
    dl.innerHTML = state.ingredients.map(i=>`<option value="${escHtml(i.name)}">`).join('');
  }
  attachHandlers();
  if(sameRoute){
    // Re-render of the same page (state update like ticking a task): keep scroll
    window.scrollTo(0, prevScroll);
  } else {
    window.scrollTo(0, 0);
  }
  _lastRouteKey = routeKey;
}

function renderRecipeDetail(id){
  const r = state.recipes.find(x=>x.id===id);
  if(!r) return notFound('Préparation introuvable','recipes');

  const cookingHtml = (r.prepTime || r.cookTemp || r.cookTime) ? `
    <div class="cooking-info">
      ${r.prepTime ? `<div class="cooking-pill cyan"><span class="lbl">Préparation</span><span class="val">${fmtMin(r.prepTime)}</span></div>`:''}
      ${r.cookTemp ? `<div class="cooking-pill"><span class="lbl">Temp.</span><span class="val">${r.cookTemp}°C</span></div>`:''}
      ${r.cookTime ? `<div class="cooking-pill"><span class="lbl">Cuisson</span><span class="val">${fmtMin(r.cookTime)}</span></div>`:''}
    </div>` : '';

  const ingsHtml = r.ingredients.map((ing,idx)=>{
    const spice = isSpiceLike(ing.name, ing.unit);
    let displayName = ing.name;
    let isLinked = false;
    if(ing.ingredientId){
      const linked = state.ingredients.find(x=>x.id===ing.ingredientId);
      if(linked){ displayName = linked.name; isLinked = true; }
    } else {
      const found = state.ingredients.find(i=>i.name.toLowerCase()===(ing.name||'').toLowerCase());
      if(found) isLinked = true;
    }
    return `
      <div class="ing-row ${spice?'spice':''}" data-idx="${idx}">
        <div class="ing-name">${isLinked?'<span style="color:var(--success);margin-right:4px" title="Ingrédient lié">⌁</span>':''}${escHtml(displayName)}</div>
        <div class="ing-amt-cell" data-base="${ing.amount}" data-unit="${escHtml(ing.unit||'')}">
          ${fmtAmount(ing.amount,ing.unit)}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="topbar">
      <button class="back" data-back>‹</button>
      <h1>Préparation</h1>
      <div class="actions">
        <button class="iconbtn" data-go="recipe/${r.id}/edit" aria-label="Éditer">✎</button>
      </div>
    </div>
    <div class="view">
      <div class="recipe-hero">
        ${r.photo ? `<div class="photo-banner" style="background-image:url(${r.photo})"></div>` : ''}
        <h2>${escHtml(r.name)}</h2>
        <div class="cat">${escHtml(r.category||'Recette')}</div>
        ${cookingHtml}
        <div class="scaler" id="scaler" data-base="${r.baseAmount}" data-unit="${r.baseUnit}">
          <div class="scaler-label">Règle de 3 — adapte la quantité</div>
          <div class="scaler-row">
            <div class="scaler-name">${escHtml(r.baseLabel||'Base')}</div>
            <div class="scaler-input">
              <button data-step="-1">−</button>
              <input id="scalerVal" type="number" inputmode="decimal" value="${r.baseAmount}" min="0" step="any">
              <span class="unit">${escHtml(r.baseUnit)}</span>
              <button data-step="1">+</button>
            </div>
          </div>
          <div class="scaler-multi">Multiplicateur : <b id="scalerMult">×1</b></div>
        </div>
      </div>

      <div class="section-block">
        <div class="block-title">Ingrédients</div>
        <div class="ing-list" id="ingList">${ingsHtml}</div>
      </div>

      ${r.instructions ? `
      <div class="section-block">
        <div class="block-title">Préparation</div>
        <div class="instructions">${escHtml(r.instructions)}</div>
      </div>`:''}

      ${r.notes ? `
      <div class="section-block">
        <div class="block-title">Remarques</div>
        <div class="notes">${escHtml(r.notes)}</div>
      </div>`:''}

      <div class="btn-row">
        <button class="btn btn-secondary" data-go="recipe/${r.id}/edit">Éditer</button>
        <button class="btn btn-danger" data-del-recipe="${r.id}">Supprimer</button>
      </div>
    </div>
  `;
}

function ingFieldRow(ing,i,total){
  const spice = isSpiceLike(ing.name||'', ing.unit||'');
  const isFirst = i===0;
  const isLast = total!=null && i===total-1;
  const linkedIng = ing.ingredientId
    ? state.ingredients.find(x=>x.id===ing.ingredientId)
    : (ing.name ? state.ingredients.find(x=>x.name.toLowerCase()===(ing.name||'').toLowerCase()) : null);
  const isLinked = !!linkedIng;
  return `<div class="dynamic-item ${spice?'spice-row':''}" data-row="${i}" ${linkedIng?`data-linked-id="${linkedIng.id}"`:''}>
    <div class="reorder">
      <button type="button" data-move-ing="up" ${isFirst?'disabled':''} aria-label="Monter">▲</button>
      <button type="button" data-move-ing="down" ${isLast?'disabled':''} aria-label="Descendre">▼</button>
    </div>
    <div style="flex:2;display:flex;align-items:center;gap:4px;min-width:0">
      <span class="link-badge" title="${isLinked?'Lié à un ingrédient':'Pas lié'}" style="font-size:14px;color:${isLinked?'var(--success)':'var(--cream-faint)'};flex-shrink:0">${isLinked?'⌁':'·'}</span>

  </div>`;
}

function componentFieldRow(c,i,total){
  const recOpts = state.recipes.map(r=>`<option value="${r.id}" ${c.type==='recipe'&&c.refId===r.id?'selected':''}>${escHtml(r.name)}</option>`).join('');
  const ingOpts = state.ingredients.map(g=>`<option value="${g.id}" ${c.type==='ingredient'&&c.refId===g.id?'selected':''}>${escHtml(g.name)}</option>`).join('');
  const isRecipe = c.type==='recipe' || !c.type;
  const isFirst = i===0;
  const isLast = total!=null && i===total-1;
  return `<div class="dynamic-item" data-component="${i}" style="flex-wrap:wrap;gap:6px">
    <div class="reorder">
      <button type="button" data-move-comp="up" ${isFirst?'disabled':''} aria-label="Monter">▲</button>
      <button type="button" data-move-comp="down" ${isLast?'disabled':''} aria-label="Descendre">▼</button>
    </div>
    <select class="comp-type" name="comp_type" style="flex:0 0 100px">
      <option value="recipe" ${isRecipe?'selected':''}>Recette</option>
      <option value="ingredient" ${c.type==='ingredient'?'selected':''}>Ingrédient</option>
    </select>
    <select class="comp-ref" name="comp_ref" style="flex:1;min-width:140px">
      ${isRecipe ? recOpts : ingOpts}
    </select>
    <input name="comp_label" value="${escHtml(c.label||'')}" placeholder="Libellé (opt.)" style="flex:1;min-width:120px">
    <input name="comp_amount" type="number" inputmode="decimal" step="any" value="${c.amount==null?'':c.amount}" placeholder="Qté" style="width:70px">
    <input name="comp_unit" value="${escHtml(c.unit||'g')}" placeholder="g" style="width:60px">
    <button type="button" class="rm" data-rm-component>×</button>
  </div>`;
}

function sectionFieldRow(s,i,opts){
  opts = opts || {};
  const routineTools = opts.routine ? `
    <div class="btn-row" style="margin-top:8px;gap:6px">
      <button type="button" class="btn btn-ghost" data-dup-section style="flex:1;font-size:12px;padding:8px">⎘ Dupliquer</button>

function variantFieldRow(v,i){

/* ---------- TASKS + ROUTINES ---------- */
let tasksTab = 'today';
let tasksTopTab = 'tasks'; // 'tasks' | 'routines'

function renderTasks(){
  return `
    <div class="topbar">
      <button class="back" data-back>‹</button>
      <h1>Tâches</h1>
      ${tasksTopTab==='tasks' ? `<div class="actions"><button class="iconbtn" data-reset-tasks aria-label="Réinitialiser">↻</button></div>` : ''}
    </div>
    <div class="view">
      <div class="toptab">
        <button data-toptab="tasks" class="${tasksTopTab==='tasks'?'active':''}">Tâches</button>
        <button data-toptab="prep" class="${tasksTopTab==='prep'?'active':''}">Préparation</button>
        <button data-toptab="routines" class="${tasksTopTab==='routines'?'active':''}">Routines</button>
      </div>
      ${tasksTopTab==='tasks' ? renderTasksContent() : tasksTopTab==='prep' ? renderPrepContent() : renderRoutinesContent()}
    </div>
    ${tasksTopTab==='routines' ? `<button class="fab" data-go="routine/new" aria-label="Ajouter une routine">+</button>` : ''}

function renderPrepContent(){
  const prep = state.prep || {}; // { recipeId: true }
  const recipes = [...filterByResto(state.recipes||[])].sort((a,b)=>{
    const ap = !!prep[a.id], bp = !!prep[b.id];
    if(ap && !bp) return -1;
    if(!ap && bp) return 1;
    return a.name.localeCompare(b.name,'fr');
  });
  const toDoCount = Object.values(prep).filter(Boolean).length;
  const list = recipes.length ? recipes.map(r=>{
    const on = !!prep[r.id];
    const searchText = [r.name, r.category, r.cuisine, r.type].filter(Boolean).join(' ').toLowerCase();
    return `<div class="stock-row ${on?'tobuy':''}" data-prep-row data-search="${escHtml(searchText)}">
      <button class="stock-check" data-toggle-prep="${r.id}" aria-label="À préparer pour demain">${on?'!':''}</button>
      <div class="stock-body" data-go="recipe/${r.id}">
        <div class="stock-name">${escHtml(r.name)}</div>
        <div class="stock-qty">${escHtml(r.type||r.category||'—')}${r.cuisine?` · ${escHtml(r.cuisine)}`:''}</div>
      </div>
      <button class="stock-edit" data-go="recipe/${r.id}" aria-label="Voir la recette">›</button>
    </div>`;
  }).join('') : `<div class="empty"><div class="empty-ico">📖</div><p>Aucune recette.</p></div>`;
  return `
    <div class="muted" style="margin-bottom:10px;font-size:12px;line-height:1.5">
      Coche les recettes <b>à préparer pour le lendemain</b>. La case rouge = à faire. Touche le nom pour ouvrir la recette.
      ${toDoCount>0?`<br><b style="color:var(--gold)">${toDoCount} préparation${toDoCount>1?'s':''} en attente</b>`:''}
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchPrep" placeholder="Rechercher une recette…" autocomplete="off">
      <button class="search-clear" aria-label="Effacer">×</button>
    </div>
    ${toDoCount>0?`<div class="btn-row" style="margin-bottom:12px"><button class="btn btn-secondary btn-block" data-clear-prep>↻ Tout décocher (préparations faites)</button></div>`:''}
    <div class="list">${list}</div>
    <div class="search-empty" id="searchPrep-empty">Aucune recette ne correspond.</div>
  `;
}

  const today = new Date().getDay();
  const filter = tasksTab;
  const items = filterByResto(state.tasks).filter(t=>{
    if(filter==='today') return t.frequency==='daily' || (t.frequency==='weekly' && t.day===today);
    if(filter==='week') return t.frequency==='weekly' || t.frequency==='daily';
    return true;
  });
  const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const restos = getRestaurants();
  const list = items.length ? items.map(t=>{
    const hasDesc = t.description && t.description.trim();
    const tr = t.restos || [];
    return `
    <div class="task-row ${t.done?'done':''}" data-task="${t.id}">
      ${bulkCheckHtml('tasks', t.id)}
      <button class="task-check" data-toggle-task="${t.id}">${t.done?'✓':''}</button>
      <div class="task-body" ${hasDesc?`data-task-expand="${t.id}" style="cursor:pointer"`:''}>
        <div class="task-title">${escHtml(t.title)}${hasDesc?' <span style="color:var(--cyan);font-size:13px" title="Détails disponibles">📝</span>':''}</div>
        <div class="task-meta">${t.frequency==='daily'?'Quotidien':t.frequency==='weekly'?'Hebdo · '+(dayNames[t.day]||'?'):'Unique'}${hasDesc?' · touche pour les détails':''}</div>
        ${hasDesc?`<div class="task-desc" id="taskdesc-${t.id}" style="display:none;margin-top:8px;padding:10px;background:var(--dark-2);border-radius:8px;font-size:13px;line-height:1.6;color:var(--cream-dim);white-space:pre-wrap">${escHtml(t.description)}</div>`:''}
      </div>
      <button class="task-edit" data-edit-task="${t.id}" aria-label="Modifier">✎</button>
      <button class="task-del" data-del-task="${t.id}">×</button>
    </div>
    <div class="task-edit-panel" id="taskedit-${t.id}" style="display:none;background:var(--navy-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin:-4px 0 10px">
      <div class="form-group">
        <label>Intitulé</label>
        <input data-te-title="${t.id}" value="${escHtml(t.title)}">
      </div>
      <div class="form-group">
        <label>Description / détails</label>
        <textarea data-te-desc="${t.id}" rows="3">${escHtml(t.description||'')}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fréquence</label>
          <select data-te-freq="${t.id}">
            <option value="daily" ${t.frequency==='daily'?'selected':''}>Quotidienne</option>
            <option value="weekly" ${t.frequency==='weekly'?'selected':''}>Hebdomadaire</option>
            <option value="once" ${t.frequency==='once'?'selected':''}>Unique</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jour (si hebdo)</label>
          <select data-te-day="${t.id}">
            <option value="1" ${t.day===1?'selected':''}>Lundi</option>
            <option value="2" ${t.day===2?'selected':''}>Mardi</option>
            <option value="3" ${t.day===3?'selected':''}>Mercredi</option>
            <option value="4" ${t.day===4?'selected':''}>Jeudi</option>
            <option value="5" ${t.day===5?'selected':''}>Vendredi</option>
            <option value="6" ${t.day===6?'selected':''}>Samedi</option>
            <option value="0" ${t.day===0?'selected':''}>Dimanche</option>
          </select>
        </div>
      </div>
      ${restos.length>1?`<div class="form-group">
        <label>Restaurants concernés</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <label class="diet-chip ${!tr.length?'on':''}"><input type="checkbox" data-te-resto-all="${t.id}" ${!tr.length?'checked':''}>🌐 Tous</label>
          ${restos.map(r=>`<label class="diet-chip"><input type="checkbox" data-te-resto="${t.id}" value="${r.id}" ${tr.includes(r.id)?'checked':''}>${escHtml(r.name)}</label>`).join('')}
        </div>
      </div>`:''}
      <div class="btn-row">
        <button class="btn btn-primary" data-te-save="${t.id}">Enregistrer</button>
        <button class="btn btn-ghost" data-te-cancel="${t.id}">Annuler</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty"><div class="empty-ico">✓</div><p>Aucune tâche pour ce filtre.</p></div>`;
  return `
    <div class="task-tabs">
      <button data-tab="today" class="${filter==='today'?'active':''}">Aujourd'hui</button>
      <button data-tab="week" class="${filter==='week'?'active':''}">Cette semaine</button>
      <button data-tab="all" class="${filter==='all'?'active':''}">Toutes</button>

    ${bulkToolbarHtml('tasks')}
    <div class="list">${list}</div>
    ${bulkActionBarHtml('tasks')}
    <div class="divider"></div>
    <form id="taskForm" class="settings-group">
      <div class="sg-head">Nouvelle tâche</div>
      <div class="form-group">
        <label>Intitulé</label>

        <div class="form-group">

          <select name="frequency">
            <option value="daily">Quotidienne</option>
