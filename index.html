}

function renderRoutinesContent(){
  const items = filterByResto(state.routines || []);
  if(!items.length) return `<div class="empty"><div class="empty-ico">⌚</div><p>Aucune routine.<br>Touche le <b>+</b> pour en créer une (ouverture, fermeture…).</p></div>`;
  const list = items.map(r=>{
    const total = (r.sections||[]).reduce((acc,s)=>acc+(s.items||[]).length,0);
    let done = 0;
    Object.values(r.checked||{}).forEach(v=>{ if(v) done++; });
    const pct = total ? Math.round(done/total*100) : 0;
    return `<button class="routine-card" data-go="routine/${r.id}">
      ${bulkCheckHtml('routines', r.id)}
      <div class="rc-body">
        <div class="rc-title">${escHtml(r.name)}</div>
        ${r.subtitle?`<div class="rc-sub">${escHtml(r.subtitle)}</div>`:''}
        <div class="rc-progress">${done}/${total} étapes${pct?` · ${pct}%`:''}</div>
        <div class="progressbar"><div class="progressbar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-arrow" style="color:var(--cyan);font-size:22px;align-self:center">›</div>
    </button>`;
  }).join('');
  return `
    ${bulkToolbarHtml('routines')}
    <div class="list">${list}</div>
    ${bulkActionBarHtml('routines')}
  `;
}

function renderRoutineDetail(id){
  const r = (state.routines||[]).find(x=>x.id===id);
  if(!r) return notFound('Routine introuvable','tasks');
  const total = (r.sections||[]).reduce((acc,s)=>acc+(s.items||[]).length,0);
  let done = 0;
  Object.values(r.checked||{}).forEach(v=>{ if(v) done++; });
  const pct = total ? Math.round(done/total*100) : 0;

  return `
    <div class="topbar">
      <button class="back" data-back>‹</button>
      <h1>Routine</h1>
      <div class="actions">
        <button class="iconbtn" data-reset-routine="${r.id}" aria-label="Réinitialiser">↻</button>
        <button class="iconbtn" data-go="routine/${r.id}/edit" aria-label="Éditer">✎</button>
      </div>
    </div>
    <div class="view">
      <div class="recipe-hero">
        <h2>${escHtml(r.name)}</h2>
        ${r.subtitle?`<div class="cat">${escHtml(r.subtitle)}</div>`:''}
        <div class="cooking-info">
          <div class="cooking-pill"><span class="lbl">Avancement</span><span class="val">${done}/${total}</span></div>
          <div class="cooking-pill cyan"><span class="lbl">Progression</span><span class="val">${pct}%</span></div>
        </div>
        <div class="progressbar" style="margin-top:12px;height:6px"><div class="progressbar-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="routine-sections" data-rou-id="${r.id}">
      ${(r.sections||[]).map((sec,si)=>{
        const secDone = (sec.items||[]).filter((_,ii)=>r.checked && r.checked[`${si}-${ii}`]).length;
        const itemsCount = (sec.items||[]).length;
        const allDone = itemsCount>0 && secDone===itemsCount;
        return `<div class="routine-section" data-section-idx="${si}">
          <div class="rs-title-row">
            <span class="rs-title-text">${escHtml(sec.title)}</span>
            <span class="rs-count">${secDone}/${itemsCount}</span>
            <button class="iconbtn rs-toggle-all" data-section-toggle="${r.id}" data-si="${si}" aria-label="Tout cocher ou décocher la section" title="Tout cocher / décocher" style="font-size:18px;padding:2px 6px">${allDone?'☑':'☐'}</button>
          </div>
          <div class="routine-items" data-rou-id="${r.id}" data-si="${si}">
          ${(sec.items||[]).map((it,ii)=>{
            const isDone = !!(r.checked && r.checked[`${si}-${ii}`]);
            return `<div class="routine-item ${isDone?'done':''}" data-item-idx="${ii}">
              <button class="ri-check" data-toggle-routine="${r.id}" data-key="${si}-${ii}">${isDone?'✓':''}</button>
              <div class="ri-text">${escHtml(it)}</div>
            </div>`;
          }).join('')}
          </div>
        </div>`;
      }).join('')}
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" data-reset-routine="${r.id}">↻ Tout décocher</button>
        <button class="btn btn-danger" data-del-routine="${r.id}">Supprimer</button>
      </div>
    </div>
  `;
}

function renderRoutineEdit(id){
  const isNew = !id;

  const showCal = state.settings.showCalories;
  const showHal = state.settings.showHalal;
  const list = items.length ? items.map(i=>{
    const searchText = [i.name, i.notes, i.unit].filter(Boolean).join(' ').toLowerCase();
    return `
    <div class="card" data-go="ingredient/${i.id}/edit" data-search="${escHtml(searchText)}">

      <div class="card-body">

function renderIngredientUsage(ing){
  const ingNameLow = ing.name.toLowerCase();
  const recipes = state.recipes.filter(r=>
    r.ingredients.some(x => x.ingredientId===ing.id || (x.name||'').toLowerCase()===ingNameLow)
  );
  const fiches = state.fiches.filter(f=>
    (f.components||[]).some(c => c.type==='ingredient' && c.refId===ing.id)
  );
  if(!recipes.length && !fiches.length){
    return `<div class="section-block">
      <div class="block-title">Utilisé dans</div>
      <div class="kcal-empty">Pas encore utilisé dans une recette ou fiche.</div>
    </div>`;
  }
  let html = `<div class="section-block"><div class="block-title">Utilisé dans (${recipes.length+fiches.length})</div>`;
  if(recipes.length){
    html += `<div class="muted" style="margin:6px 0 4px;font-size:11px;letter-spacing:.15em;text-transform:uppercase">Recettes</div>`;
    html += recipes.map(r=>{
      const ingMatch = r.ingredients.find(x => x.ingredientId===ing.id || (x.name||'').toLowerCase()===ingNameLow);
      const qty = ingMatch && ingMatch.unit !== 'au goût' && ingMatch.amount > 0
        ? `${ingMatch.amount}${ingMatch.unit||''}` : 'au goût';
      return `<button class="linked-recipe" data-go="recipe/${r.id}" style="width:100%;text-align:left">
        <span>${escHtml(r.name)}</span>
        <span class="lr-amt">${qty}</span>
        <span class="lr-arrow-after">›</span>
      </button>`;
    }).join('');
  }
  if(fiches.length){
    html += `<div class="muted" style="margin:10px 0 4px;font-size:11px;letter-spacing:.15em;text-transform:uppercase">Fiches</div>`;
    html += fiches.map(f=>{
      const compMatch = (f.components||[]).find(c => c.type==='ingredient' && c.refId===ing.id);
      const qty = compMatch ? `${compMatch.amount}${compMatch.unit||''}` : '';
      return `<button class="linked-recipe" data-go="fiche/${f.id}" style="width:100%;text-align:left">
        <span>${escHtml(f.name)}</span>
        <span class="lr-amt">${qty}</span>
        <span class="lr-arrow-after">›</span>
      </button>`;
    }).join('');
  }
  html += `</div>`;
  return html;
}

/* ---------- STOCK ---------- */
let stockFilter = 'all'; // 'all' | 'tobuy' | 'low'
let stockStoreFilter = 'all'; // 'all' | store name | 'none'

function buildStockEntries(){
  const result = (state.stock||[]).map(s => ({...s, _virtual:false}));
  state.ingredients.forEach(ing => {
    if(!result.find(s => s.ingredientId === ing.id)){
      result.push({
        id: 's_v_'+ing.id,
        ingredientId: ing.id,
        name: ing.name,
        qty: null,
        unit: ing.unit,
        toBuy: false,
        note: '',
        store: null,
        _virtual: true
      });
    }
  });
  return result;
}

function getStockName(s){
  if(s.ingredientId){
    const ing = state.ingredients.find(i=>i.id===s.ingredientId);
    if(ing) return ing.name;
  }
  return s.name || '?';
}

// True if this item should appear in the "à racheter" list:
// manual flag OR explicitly empty OR at/below its minimum threshold.
function needsRestock(s){
  if(s.toBuy === true) return true;
  if(s.qty != null && Number(s.qty) === 0) return true;
  if(s.qty != null && s.minQty != null && Number(s.minQty) > 0 && Number(s.qty) <= Number(s.minQty)) return true;
  return false;
}

function renderStock(){
  const stores = state.settings.stores || [];
  const all = buildStockEntries();
  let items = [...all];
  if(stockFilter==='tobuy') items = items.filter(s=>needsRestock(s));
  if(stockStoreFilter!=='all'){
    if(stockStoreFilter==='none') items = items.filter(s=>!s.store);
    else items = items.filter(s=>s.store===stockStoreFilter);
  }
  items.sort((a,b)=>{
    const ar=needsRestock(a), br=needsRestock(b);
    if(ar && !br) return -1;
    if(!ar && br) return 1;
    return getStockName(a).localeCompare(getStockName(b),'fr');
  });
  const toBuyCount = all.filter(s=>needsRestock(s)).length;
  const list = items.length ? items.map(s=>{
    const restock = needsRestock(s);
    const isZero = (s.qty===0 || s.qty==null);
    const name = getStockName(s);
    const lowByThreshold = s.qty!=null && s.minQty!=null && Number(s.minQty)>0 && Number(s.qty)<=Number(s.minQty) && !s.toBuy;
    return `<div class="stock-row ${restock?'tobuy':''} ${s._virtual?'virtual':''}" data-stock="${s.id}" data-search="${escHtml((name+' '+(s.store||'')+' '+(s.note||'')).toLowerCase())}">
      <button class="stock-check" data-toggle-stock="${s.id}" aria-label="Marquer à acheter">${restock?'!':''}</button>
      <div class="stock-body">
        <div class="stock-name">${escHtml(name)}</div>
        <div class="stock-qty ${isZero?'zero':''}">${s.qty==null?'—':s.qty}<span class="unit">${escHtml(s.unit||'')}</span>${s.minQty!=null&&Number(s.minQty)>0?` <span style="color:var(--cream-faint);font-size:10px">(seuil ${s.minQty})</span>`:''}${s.store?` · <span style="color:var(--cyan);font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase">${escHtml(s.store)}</span>`:''}</div>
        ${lowByThreshold?`<div class="stock-note" style="color:var(--gold)">⚠ Sous le seuil — à racheter</div>`:''}
        ${s.note?`<div class="stock-note">${escHtml(s.note)}</div>`:''}
      </div>
      <button class="stock-edit" data-edit-stock="${s.id}" aria-label="Éditer">✎</button>
      ${!s._virtual && !s.ingredientId ? `<button class="stock-del" data-del-stock="${s.id}" aria-label="Supprimer">×</button>` : ''}
    </div>`;
  }).join('') : `<div class="empty"><div class="empty-ico">🛒</div><p>Aucun produit dans ce filtre.</p></div>`;
  return `
    <div class="topbar">
      <button class="back" data-back>‹</button>
      <h1>Stock & courses</h1>
    </div>
    <div class="view">
      <div class="seg-tabs">
        <button data-stock-filter="all" class="${stockFilter==='all'?'active':''}">Tous (${all.length})</button>
        <button data-stock-filter="tobuy" class="${stockFilter==='tobuy'?'active':''}">🛒 À racheter (${toBuyCount})</button>
      </div>
      ${stores.length ? `<div class="seg-tabs" style="margin-bottom:14px">
        <button data-stock-store="all" class="${stockStoreFilter==='all'?'active':''}">Tous magasins</button>
        ${stores.map(st=>`<button data-stock-store="${escHtml(st)}" class="${stockStoreFilter===st?'active':''}">${escHtml(st)}</button>`).join('')}
        <button data-stock-store="none" class="${stockStoreFilter==='none'?'active':''}">Sans</button>
      </div>` : ''}
      <div class="search-wrap">
        <input class="search-input" id="searchStock" placeholder="Rechercher un produit, un magasin…" autocomplete="off">
        <button class="search-clear" aria-label="Effacer">×</button>
      </div>
      <div class="muted" style="margin-bottom:10px;font-size:11px;letter-spacing:.1em">Touche la case rouge pour forcer "à racheter". Définis un <b>seuil minimum</b> via ✎ : sous ce seuil, le produit passe automatiquement en "à racheter".</div>
      ${stockFilter==='tobuy' && toBuyCount>0 ? `<div class="btn-row" style="margin-bottom:14px">
        <button class="btn btn-secondary btn-block" id="copyToBuyBtn">📋 Copier la liste à racheter</button>
      </div>` : ''}
      <div class="list">${list}</div>
      <div class="search-empty" id="searchStock-empty">Aucun produit ne correspond à ta recherche.</div>
      <div class="divider"></div>
      <form id="stockForm" class="settings-group">
        <div class="sg-head">Ajouter un produit hors ingrédients</div>
        <div class="muted" style="margin-bottom:8px;font-size:11px">Pour des produits non-ingrédients (consommables, matériel…). Les ingrédients apparaissent automatiquement.</div>
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>Nom</label>
            <input name="name" required placeholder="Ex : Papier alu">
          </div>
          <div class="form-group">
            <label>Quantité</label>
            <input name="qty" type="number" inputmode="decimal" step="any" placeholder="0">
          </div>
          <div class="form-group">
            <label>Unité</label>
            <input name="unit" placeholder="kg, L…">
          </div>
        </div>
        ${stores.length ? `<div class="form-group">
          <label>Magasin</label>
          <select name="store">
            <option value="">— Aucun —</option>
            ${stores.map(st=>`<option value="${escHtml(st)}">${escHtml(st)}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="form-group">
          <label>Note (optionnel)</label>
          <input name="note" placeholder="Ex : Pack de 100">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Ajouter à la liste</button>
      </form>
    </div>
  `;
}

function renderStockEdit(id){
  let s = (state.stock||[]).find(x=>x.id===id);
  let isVirtual = false;
  if(!s){
    const all = buildStockEntries();
    s = all.find(x=>x.id===id);
    if(s) isVirtual = true;
  }
  if(!s) return notFound('Produit introuvable','stock');
  const stores = state.settings.stores || [];
  const linkedIng = s.ingredientId ? state.ingredients.find(i=>i.id===s.ingredientId) : null;
  const displayName = linkedIng ? linkedIng.name : s.name;
  return `
    <div class="topbar">
      <button class="back" data-back>‹</button>
      <h1>Produit</h1>
    </div>
    <div class="view">
      <form id="stockEditForm" data-edit-id="${escHtml(s.id)}" data-virtual="${isVirtual?'1':''}">
        <div class="form-group">
          <label>Nom</label>
          ${linkedIng ? `<input value="${escHtml(displayName)}" disabled style="opacity:.6">
          <p class="muted" style="margin-top:4px;font-size:11px">⌁ Lié à l'ingrédient. Pour changer le nom, modifie l'ingrédient.</p>` : `<input name="name" value="${escHtml(s.name||'')}" required>`}
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantité restante</label>
            <input name="qty" type="number" inputmode="decimal" step="any" value="${s.qty==null?'':s.qty}">
          </div>
          <div class="form-group">
            <label>Unité</label>
            <input name="unit" value="${escHtml(s.unit||'')}">
          </div>
        </div>
        <div class="form-group">
          <label>Seuil minimum (auto "à racheter")</label>
          <input name="minQty" type="number" inputmode="decimal" step="any" value="${s.minQty==null?'':s.minQty}" placeholder="Ex : 5">
          <p class="muted" style="margin-top:4px;font-size:11px">Quand la quantité descend à ce niveau ou en dessous, le produit passe automatiquement dans la liste « à racheter ». Laisse vide pour désactiver.</p>
        </div>
        ${stores.length ? `<div class="form-group">
          <label>Magasin où acheter</label>
          <select name="store">
            <option value="" ${!s.store?'selected':''}>— Aucun —</option>
            ${stores.map(st=>`<option value="${escHtml(st)}" ${s.store===st?'selected':''}>${escHtml(st)}</option>`).join('')}
          </select>
        </div>` : ''}
        <div class="form-group">
          <label>Note</label>
          <input name="note" value="${escHtml(s.note||'')}">
        </div>
        <button type="button" class="toggle" data-toggle-form="toBuy">
          <span class="toggle-label">À racheter</span>
          <span class="toggle-switch ${s.toBuy?'on':''}"></span>
        </button>
        <input type="hidden" name="toBuy" value="${s.toBuy?'1':''}">
        <div class="btn-row">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          ${!isVirtual && !s.ingredientId ? `<button type="button" class="btn btn-danger" data-del-stock="${s.id}">Supprimer</button>` : ''}
          <button type="button" class="btn btn-ghost" data-back>Annuler</button>
        </div>
      </form>
    </div>
  `;
}

/* ---------- Event handlers ---------- */
function refreshReorderButtons(containerSel, attrName){
  const container = $(containerSel);
  if(!container) return;
  const rows = Array.from(container.children);
  rows.forEach((row,i)=>{
    const upBtn = row.querySelector(`[${attrName}="up"]`);
    const downBtn = row.querySelector(`[${attrName}="down"]`);
    if(upBtn) upBtn.disabled = i===0;
    if(downBtn) downBtn.disabled = i===rows.length-1;
  });
}

function openRestoManager(){
  const restos = getRestaurants();
  const ov = document.createElement('div');
  ov.className = 'modal-bg';
  const rowsHtml = ()=> getRestaurants().map(r=>`
    <div class="rm-row" style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--dark-2);border-radius:8px;margin-bottom:6px">
      <input class="ing-name-i rm-name" data-id="${r.id}" value="${escHtml(r.name)}" style="flex:1">
      <button class="btn btn-secondary rm-save" data-id="${r.id}" style="padding:8px 12px;font-size:12px">✓</button>
      ${getRestaurants().length>1?`<button class="btn btn-ghost rm-del" data-id="${r.id}" style="padding:8px 12px;font-size:12px;color:var(--danger)">×</button>`:''}
    </div>`).join('');
  ov.innerHTML = `<div class="modal">
    <div style="font-family:var(--font-display);font-size:22px;color:var(--gold);letter-spacing:.04em;margin-bottom:6px">🏪 Mes restaurants</div>
    <p class="muted" style="font-size:12px;margin-bottom:14px;line-height:1.5">Ajoute tous les établissements de ton business. Chaque préparation, fiche, tâche peut viser un, plusieurs, ou tous les restos. La vue Globale agrège tout.</p>
    <div id="rmList">${rowsHtml()}</div>
    <div class="form-row" style="align-items:flex-end;margin-top:12px">
      <div class="form-group" style="flex:1;margin-bottom:0">
        <label>Nouveau restaurant</label>
        <input id="rmNew" placeholder="Ex : Mexy Fresh Centre-ville" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="rmAdd" style="white-space:nowrap">+ Ajouter</button>
    </div>
    <button class="btn btn-ghost btn-block" style="margin-top:16px" data-rm-close>Fermer</button>
  </div>`;
  document.body.appendChild(ov);

  const refresh = ()=>{ ov.querySelector('#rmList').innerHTML = rowsHtml(); bindRows(); };
  function bindRows(){
    ov.querySelectorAll('.rm-save').forEach(b=>b.addEventListener('click',async()=>{
      const id=b.getAttribute('data-id');
      const inp=ov.querySelector(`.rm-name[data-id="${id}"]`);
      const v=(inp&&inp.value||'').trim();
      if(!v){ toast('Nom vide'); return; }
      const r=getRestaurants().find(x=>x.id===id);
      if(r){ r.name=v; await persist(); toast('Renommé'); render(); }
    }));
    ov.querySelectorAll('.rm-del').forEach(b=>b.addEventListener('click',async()=>{
      const id=b.getAttribute('data-id');
      const r=getRestaurants().find(x=>x.id===id);
      if(!r) return;
      if(!confirm(`Supprimer « ${r.name} » ?\nLes éléments qui lui étaient spécifiquement assignés resteront mais ne seront plus filtrés par ce resto.`)) return;
      state.restaurants=getRestaurants().filter(x=>x.id!==id);
      ['recipes','fiches','ingredients','tasks','routines'].forEach(k=>{
        (state[k]||[]).forEach(it=>{ if(it.restos) it.restos=it.restos.filter(x=>x!==id); });
      });
      if(activeResto()===id) setActiveResto('global');
      await persist(); toast('Supprimé'); refresh(); render();
    }));
  }
  bindRows();
  ov.querySelector('#rmAdd').addEventListener('click',async()=>{
    const inp=ov.querySelector('#rmNew');
    const v=(inp.value||'').trim();
    if(!v){ toast('Nom vide'); return; }
    getRestaurants().push({ id:'r_'+Math.random().toString(36).slice(2,8), name:v });
    inp.value='';
    await persist(); toast('Restaurant ajouté'); refresh(); render();
  });
  ov.addEventListener('click', e=>{ if(e.target===ov || e.target.closest('[data-rm-close]')) ov.remove(); });
}

         1. En bas de Safari, touche le bouton <b>Partager</b> (carré avec une flèche vers le haut).<br><br>

function bindSyncHandlers(){
  const cfg = SyncConfig.load() || {};

  // Theme picker (no code needed, local to device)
  $$('[data-theme-pick]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t = btn.getAttribute('data-theme-pick');
      applyTheme(t);
      toast('Thème appliqué');
      render();
    });
  });

  // Devices list + rename
  const devList = $('#devicesList');
  if(devList){
    const devices = state._devices || {};
    const myId = getDeviceId();
    const entries = Object.keys(devices).map(id=>({id, ...devices[id]}))
      .sort((a,b)=>(b.lastSeen||0)-(a.lastSeen||0));
    const fmtAgo = ts=>{
      if(!ts) return 'jamais';
      const s = Math.floor((Date.now()-ts)/1000);
      if(s<60) return 'à l\'instant';
      if(s<3600) return 'il y a '+Math.floor(s/60)+' min';
      if(s<86400) return 'il y a '+Math.floor(s/3600)+' h';
      return 'il y a '+Math.floor(s/86400)+' j';
    };
    devList.innerHTML = entries.length ? entries.map(d=>{
      const isMe = d.id===myId;
      const online = d.lastSeen && (Date.now()-d.lastSeen) < 90000;
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--dark-2);border-radius:8px;margin-bottom:6px">
        <span style="width:9px;height:9px;border-radius:50%;flex-shrink:0;background:${online?'var(--success)':'var(--cream-faint)'}"></span>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;color:var(--cream)">${escHtml(d.name||'Appareil')}${isMe?' <span style="color:var(--cyan);font-size:11px">(cet appareil)</span>':''}</div>
          <div style="font-size:11px;color:var(--cream-faint)">${d.role==='chef'?'🍳 Gestion':'🛎 Employé'} · ${fmtAgo(d.lastSeen)}</div>
        </div>
      </div>`;
    }).join('') : '<p class="muted" style="font-size:12px">Aucun appareil enregistré pour l\'instant. Lance une synchro.</p>';
  }
  const devNameSave = $('#deviceNameSave');
  if(devNameSave){
    devNameSave.addEventListener('click',async()=>{
      const inp = $('#deviceNameInput');
      const v = (inp.value||'').trim();
      if(!v){ toast('Nom vide'); return; }
      setDeviceName(v);
      // Update own entry + push
      if(!state._devices) state._devices = {};
      const did = getDeviceId();
      state._devices[did] = Object.assign(state._devices[did]||{}, {name:v, role:getRole(), lastSeen:Date.now()});
      await persist();
      toast('Appareil renommé');
      render();
    });
  }

  // ── Bulk-edit unlock toggle ──
  const bulkUnlockToggle = $('#bulkUnlockToggle');
  const bulkUnlockSwitch = $('#bulkUnlockSwitch');
  if(bulkUnlockToggle && bulkUnlockSwitch){
    if(bulkUnlocked) bulkUnlockSwitch.classList.add('on');
    bulkUnlockToggle.addEventListener('click',()=>{
      bulkUnlocked = !bulkUnlocked;
      bulkUnlockSwitch.classList.toggle('on', bulkUnlocked);
      if(!bulkUnlocked) bulkClear();
      toast(bulkUnlocked ? "Édition groupée disponible sur les listes" : "Édition groupée masquée");
    });
  }

  // ── Restaurant management ──
  const restosListEl = $('#restosList');
  if(restosListEl){
    const restos = getRestaurants();
    restosListEl.innerHTML = restos.map(r=>`
      <div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--dark-2);border-radius:8px;margin-bottom:6px">
        <input class="ing-name-i" data-resto-name="${r.id}" value="${escHtml(r.name)}" style="flex:1">
        <button class="btn btn-secondary" data-resto-rename="${r.id}" style="padding:8px 12px;font-size:12px">✓</button>
        ${restos.length>1?`<button class="btn btn-ghost" data-resto-del="${r.id}" style="padding:8px 12px;font-size:12px;color:var(--danger)">×</button>`:''}
      </div>`).join('');
  }
  const addRestoBtn = $('#addRestoBtn');
  if(addRestoBtn){
    addRestoBtn.addEventListener('click',async()=>{
      const inp = $('#newRestoName');
      const v = (inp.value||'').trim();
      if(!v){ toast('Nom vide'); return; }
      getRestaurants().push({ id:'r_'+Math.random().toString(36).slice(2,8), name:v });
      await persist();
      toast('Restaurant ajouté');
      render();
    });
  }
  $$('[data-resto-rename]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-resto-rename');
    const inp = document.querySelector(`[data-resto-name="${id}"]`);
    const v = (inp && inp.value||'').trim();
    if(!v){ toast('Nom vide'); return; }
    const r = getRestaurants().find(x=>x.id===id);
    if(r){ r.name = v; await persist(); toast('Renommé'); render(); }
  }));
  $$('[data-resto-del]').forEach(b=>b.addEventListener('click',async()=>{
    const id = b.getAttribute('data-resto-del');
    const r = getRestaurants().find(x=>x.id===id);
    if(!r) return;
    if(!confirm(`Supprimer le restaurant « ${r.name} » ?\nLes recettes/fiches/tâches qui lui étaient spécifiquement assignées resteront mais ne seront plus filtrées par ce resto.`)) return;
    state.restaurants = getRestaurants().filter(x=>x.id!==id);
    // Clean references in library items
    ['recipes','fiches','ingredients','tasks','routines'].forEach(k=>{
      (state[k]||[]).forEach(it=>{ if(it.restos) it.restos = it.restos.filter(x=>x!==id); });
    });
    if(activeResto()===id) setActiveResto('global');
    await persist();
    toast('Restaurant supprimé');
    render();
  }));

  const ownerEl = $('#syncOwner');
  const repoEl = $('#syncRepo');
  const pathEl = $('#syncPath');
  const branchEl = $('#syncBranch');
  const tokenEl = $('#syncToken');
  const autoSwitch = $('#syncAutoSwitch');
  const autoToggleBtn = $('[data-toggle-sync-auto]');

  // Always wire role pills + Start + admin even if advanced fields not present
  $$('.role-pill').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const role = btn.getAttribute('data-role');
      state.settings.role = role;
      await persist();
      toast('Rôle : '+(role==='chef'?'Gestion':'Employé'));
      render();
    });
  });

  // ── Big "Démarrer la synchro" button ──
  const startBtn = $('#syncStartBtn');
  const startHint = $('#syncStartHint');
  if(startBtn){
    startBtn.addEventListener('click', async ()=>{
      // Need a configured token (entered once via advanced settings)
      let c = SyncConfig.load();
      if(!c || !c.token){
        if(startHint) startHint.textContent = "Pas encore configuré. Le responsable doit entrer le code des réglages avancés et coller le token.";
        toast('Synchro non configurée');
        return;
      }
      if(!c.owner) c.owner = SYNC_DEFAULTS.owner;
      if(!c.repo)  c.repo  = SYNC_DEFAULTS.repo;
      SyncConfig.save(c);
      startBtn.disabled = true;
      startBtn.innerHTML = '<span class="spinner"></span> Connexion…';
      if(startHint) startHint.textContent = 'Récupération des données…';
      const ok = await cloudPull(false);
      if(ok){
        startPolling();
        startBtn.innerHTML = '✓ SYNCHRO ACTIVE';
        startBtn.style.background = 'var(--success)';
        if(startHint) startHint.textContent = 'Mise à jour automatique toutes les 30 s.';
        toast('Synchronisation lancée');
      } else {
        startBtn.disabled = false;
        startBtn.innerHTML = '▶ DÉMARRER LA SYNCHRO';
        if(startHint) startHint.textContent = 'Échec — vérifie ta connexion internet et réessaie.';
      }
      updateSyncStatusUI();
    });
    // Reflect already-running state
    if(_pollTimer){
      startBtn.innerHTML = '✓ SYNCHRO ACTIVE';
      startBtn.style.background = 'var(--success)';
      startBtn.disabled = true;
      if(startHint) startHint.textContent = 'Mise à jour automatique toutes les 30 s.';
    }
  }

  // ── Advanced settings unlock (code: 5254) ──
  const advCodeEl = $('#advCode');
  const advUnlockBtn = $('#advUnlockBtn');
  const advArea = $('#advArea');
  if(advUnlockBtn && advArea){
    const tryAdv = ()=>{
      if((advCodeEl.value||'').trim() === '5254'){
        advArea.style.display = 'block';
        advUnlockBtn.textContent = '✓ Ouvert';
        advUnlockBtn.disabled = true;
        toast('Réglages avancés déverrouillés');
      } else {
        toast('Code incorrect');
        advCodeEl.value = '';
      }
    };
    advUnlockBtn.addEventListener('click', tryAdv);
    advCodeEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); tryAdv(); } });
  }

  // ── Add to home screen ──
  const addHomeBtn = $('#addHomeBtn');
  if(addHomeBtn){
    addHomeBtn.addEventListener('click', async ()=>{
      if(window._deferredInstallPrompt){
        window._deferredInstallPrompt.prompt();
        const choice = await window._deferredInstallPrompt.userChoice.catch(()=>null);
        window._deferredInstallPrompt = null;
        if(choice && choice.outcome==='accepted') toast('App installée');
        return;
      }
      // iOS / fallback: show instructions
      showInstallInstructions();
    });
  }

  if(!ownerEl) return; // Advanced fields not in DOM (collapsed section absent)

  // Prefill advanced fields from saved cfg OR defaults (token NEVER prefilled)
  ownerEl.value  = cfg.owner  || SYNC_DEFAULTS.owner;
  repoEl.value   = cfg.repo   || SYNC_DEFAULTS.repo;
  pathEl.value   = cfg.path   || SYNC_DEFAULTS.path;
  branchEl.value = cfg.branch || SYNC_DEFAULTS.branch;
  tokenEl.value  = '';
  if(autoSwitch && (cfg.auto || SYNC_DEFAULTS.auto)) autoSwitch.classList.add('on');

  updateSyncStatusUI();

  if(autoToggleBtn && autoSwitch){
    autoToggleBtn.addEventListener('click',()=>{
      autoSwitch.classList.toggle('on');
      const cur = SyncConfig.load() || Object.assign({},SYNC_DEFAULTS);
      cur.auto = autoSwitch.classList.contains('on');
      SyncConfig.save(cur);
      toast(cur.auto ? 'Auto-push activé' : 'Auto-push désactivé');
    });
  }

  const collect = ()=>({
    owner: ownerEl.value.trim(),
    repo: repoEl.value.trim(),
    path: pathEl.value.trim() || 'resto-data.json',
    branch: branchEl.value.trim() || 'main',
    token: tokenEl.value.trim(),
    auto: autoSwitch && autoSwitch.classList.contains('on'),
    lastSync: cfg.lastSync || null
  });

  const saveBtn = $('#syncSaveBtn');
  if(saveBtn) saveBtn.addEventListener('click',()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Owner, repo et token requis'); return; }
    SyncConfig.save(c);
    toast('Config enregistrée');
    updateSyncStatusUI();
    startPolling();
  });

  const testBtn = $('#syncTestBtn');
  if(testBtn) testBtn.addEventListener('click',async()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Owner, repo et token requis'); return; }
    testBtn.innerHTML = '<span class="spinner"></span> Test…';
    testBtn.disabled = true;
    try{
      await GitHubSync.test(c);
      toast('✓ Connexion GitHub OK');
    }catch(err){
      alert('Échec : '+err.message);
    }finally{
      testBtn.innerHTML = 'Tester';
      testBtn.disabled = false;
    }
  });

  const pullBtn = $('#syncPullBtn');
  if(pullBtn) pullBtn.addEventListener('click',async()=>{
    const c = collect();
    if(!c.owner || !c.repo || !c.token){ alert('Configure et enregistre d\'abord'); return; }
    if(!confirm('Récupérer les données depuis GitHub ?\nCela écrasera tes données locales actuelles.')) return;
    SyncConfig.save(c);
    await cloudPull(false);
  });

  const pushBtn = $('#syncPushBtn');
  if(pushBtn){
    if(getRole()==='service'){
      pushBtn.textContent = '⬆ Push état partagé';
      pushBtn.title = "Pousse uniquement le stock + tâches cochées (lecture seule sur la bibliothèque)";
    } else {
      pushBtn.textContent = '⬆ Push (envoyer)';
    }
    pushBtn.addEventListener('click',async()=>{
      const c = collect();
      if(!c.owner || !c.repo || !c.token){ alert('Configure et enregistre d\'abord'); return; }
      SyncConfig.save(c);
      await cloudPush(false);
    });
  }

  const clearBtn = $('#syncClearBtn');
  if(clearBtn) clearBtn.addEventListener('click',()=>{
    if(!confirm('Effacer la config sync (les données locales et GitHub restent intactes) ?')) return;
    SyncConfig.clear();
    _currentSha = null;
    _libSha = null;
    _sharedSha = null;
    _libETag = null;
    _sharedETag = null;
    stopPolling();
    toast('Config effacée');
    render();
  });
}

/* ---------- Search (in-list filter) ---------- */
function bindSearch(inputId, itemSel){
  const input = document.getElementById(inputId);
  if(!input) return;
  const wrap = input.closest('.search-wrap');
  const clearBtn = wrap ? wrap.querySelector('.search-clear') : null;
  // The list of items to filter — search the closest ancestor that contains them
  function getList(){
    return document.querySelectorAll(itemSel);
  }
  function getEmpty(){
    return document.querySelector('#'+inputId+'-empty');
  }
  function filter(){
    const q = input.value.trim().toLowerCase();
    let visible = 0;
    getList().forEach(item=>{
      const text = item.getAttribute('data-search') || '';
      const match = !q || text.includes(q);
      item.style.display = match ? '' : 'none';
      if(match) visible++;
    });
    if(clearBtn) clearBtn.classList.toggle('visible', q.length > 0);
    const empty = getEmpty();
    if(empty) empty.classList.toggle('visible', visible===0 && q.length>0);
  }
  input.addEventListener('input', filter);
  if(clearBtn){
    clearBtn.addEventListener('click', ()=>{
      input.value = '';
      filter();
      input.focus();
    });
  }
  // Initial state (in case input has saved value)
  filter();
}

/* ---------- Drag-to-reorder (long-press, touch + mouse) ---------- */
function enableDragReorder(opts){
  const { container, itemSelector, handleSelector, onReorder } = opts;
  if(!container) return;
  const LONG_PRESS = 280;
  const MOVE_THRESHOLD = 8;

  // Use a single per-container session
  let session = null;

  function getTouchPos(e){
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]);
    return t ? { x:t.clientX, y:t.clientY } : { x:0, y:0 };
  }
  function getMousePos(e){ return { x:e.clientX, y:e.clientY }; }

  function isInteractive(target){
    return !!target.closest('button, input, select, textarea, a, label');
  }

  function findItem(target){
    const item = target.closest(itemSelector);
    if(!item || item.parentNode !== container) return null;
    if(isInteractive(target)) return null;
    if(handleSelector){
      const handle = target.closest(handleSelector);
      if(!handle || !item.contains(handle)) return null;
    }
    return item;
  }

  function makeSession(item, pos, kind){
    return {
      kind,                 // 'touch' | 'mouse'
      item,
      pressX:pos.x,
      pressY:pos.y,
      offsetX:0,
      offsetY:0,
      dragging:false,
      placeholder:null,
      origIdx:Array.from(container.children).indexOf(item),
      pressTimer:null
    };
  }

  function startDrag(pos){
    if(!session) return;
    const item = session.item;
    if(navigator.vibrate) { try{ navigator.vibrate(15); }catch(e){} }
    const rect = item.getBoundingClientRect();
    session.offsetX = pos.x - rect.left;
    session.offsetY = pos.y - rect.top;
    const placeholder = document.createElement('div');
    placeholder.className = 'drag-placeholder';
    placeholder.style.height = rect.height + 'px';
    item.parentNode.insertBefore(placeholder, item.nextSibling);
    session.placeholder = placeholder;
    item.classList.remove('drag-pressing');
    item.classList.add('drag-active');
    item.style.position = 'fixed';
    item.style.left = rect.left + 'px';
    item.style.top  = rect.top + 'px';
    item.style.width = rect.width + 'px';
    item.style.margin = '0';
    session.dragging = true;
  }

  function updateDropTarget(clientY){
    if(!session) return;
    const siblings = Array.from(container.children).filter(el =>
      el !== session.item && !el.classList.contains('drag-placeholder')
    );
    for(const sib of siblings){
      const r = sib.getBoundingClientRect();
      if(clientY < r.top + r.height/2){
        if(session.placeholder.nextSibling !== sib){
          container.insertBefore(session.placeholder, sib);
        }
        return;
      }
    }
    container.appendChild(session.placeholder);
  }

  function finishDrag(){
    if(!session) return;
    const childrenNoDragged = Array.from(container.children).filter(c => c !== session.item);
    const newIdx = childrenNoDragged.indexOf(session.placeholder);
    session.item.classList.remove('drag-active');
    session.item.removeAttribute('style');
    session.placeholder.parentNode.insertBefore(session.item, session.placeholder);
    session.placeholder.remove();
    const origIdx = session.origIdx;
    cleanupSession();
    if(origIdx !== newIdx && newIdx >= 0){
      try{ onReorder(origIdx, newIdx); }catch(e){ console.error(e); }
    }
  }

  function cancelSession(){
    if(!session) return;
    if(session.pressTimer){ clearTimeout(session.pressTimer); session.pressTimer = null; }
    session.item.classList.remove('drag-pressing');
    if(session.placeholder){ session.placeholder.remove(); session.placeholder = null; }
    if(session.dragging){
      session.item.classList.remove('drag-active');
      session.item.removeAttribute('style');
      session.dragging = false;
    }
    cleanupSession();
  }

  function cleanupSession(){
    if(!session) return;
    if(session.kind === 'touch'){
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      document.removeEventListener('touchcancel', onTouchEnd);
    } else {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    }
    if(session.pressTimer){ clearTimeout(session.pressTimer); }
    session = null;
  }

  // Touch handlers
  function onTouchStart(e){
    if(session) return;
    if(e.touches.length !== 1) return; // ignore multi-touch
    const item = findItem(e.target);
    if(!item) return;
    const pos = getTouchPos(e);
    session = makeSession(item, pos, 'touch');
    item.classList.add('drag-pressing');
    session.pressTimer = setTimeout(()=>{
      if(session && !session.dragging) startDrag({ x:pos.x, y:pos.y });
    }, LONG_PRESS);
    document.addEventListener('touchmove', onTouchMove, { passive:false });
    document.addEventListener('touchend', onTouchEnd);
    document.addEventListener('touchcancel', onTouchEnd);
  }

  function onTouchMove(e){
    if(!session) return;
    const pos = getTouchPos(e);
    if(session.dragging){
      e.preventDefault();
      session.item.style.left = (pos.x - session.offsetX) + 'px';
      session.item.style.top  = (pos.y - session.offsetY) + 'px';
      updateDropTarget(pos.y);
    } else {
      const dx = Math.abs(pos.x - session.pressX);
      const dy = Math.abs(pos.y - session.pressY);
      if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
        cancelSession();
      }
    }
  }
  function onTouchEnd(e){
    if(!session) return;
    if(session.dragging) finishDrag();
    else cancelSession();
  }

  // Mouse handlers
  function onMouseDown(e){
    if(session) return;
    if(e.button !== 0) return;
    const item = findItem(e.target);
    if(!item) return;
    const pos = getMousePos(e);
    session = makeSession(item, pos, 'mouse');
    item.classList.add('drag-pressing');
    session.pressTimer = setTimeout(()=>{
      if(session && !session.dragging) startDrag(pos);
    }, LONG_PRESS);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }
  function onMouseMove(e){
    if(!session) return;
    const pos = getMousePos(e);
    if(session.dragging){
      e.preventDefault();
      session.item.style.left = (pos.x - session.offsetX) + 'px';
      session.item.style.top  = (pos.y - session.offsetY) + 'px';
      updateDropTarget(pos.y);
    } else {
      const dx = Math.abs(pos.x - session.pressX);
      const dy = Math.abs(pos.y - session.pressY);
      if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
        cancelSession();
      }
    }
  }
  function onMouseUp(e){
    if(!session) return;
    if(session.dragging) finishDrag();
    else cancelSession();
  }

  container.addEventListener('touchstart', onTouchStart, { passive:true });
  container.addEventListener('mousedown', onMouseDown);
}

function attachHandlers(){
  // Restaurant selector (home)
  $$('[data-resto-pick]').forEach(b=>b.addEventListener('click',()=>{
    setActiveResto(b.getAttribute('data-resto-pick'));
    render();
  }));
  // Manage restaurants (modal, accessible to everyone from home)
  $$('[data-manage-restos]').forEach(b=>b.addEventListener('click',()=>openRestoManager()));
  // "Tous" chip in editor resto-selector: checking it clears specific picks
  $$('[data-resto-all-cb]').forEach(allCb=>{
    const group = allCb.closest('.settings-group');
    if(!group) return;
    const specifics = group.querySelectorAll('input[name="resto_apply"]');
    const allLabel = allCb.closest('label');
    const sync = ()=>{
      const anySpecific = Array.from(specifics).some(c=>c.checked);
      allCb.checked = !anySpecific;
      if(allLabel) allLabel.classList.toggle('on', allCb.checked);
    };
    allCb.addEventListener('change',()=>{
      if(allCb.checked){ specifics.forEach(c=>c.checked=false); }
      sync();
    });
    specifics.forEach(c=>c.addEventListener('change',sync));
  });
  // Navigation
  $$('[data-go]').forEach(b=>b.addEventListener('click',e=>{
    // In bulk select mode, tapping a card toggles its selection instead of navigating
    if(bulkMode){
      const go = b.getAttribute('data-go');
      const m = go && go.match(/^(recipe|fiche|ingredient|routine)\/([^/]+)$/);
      const kindMap = {recipe:'recipes',fiche:'fiches',ingredient:'ingredients',routine:'routines'};
      if(m && kindMap[m[1]]===bulkMode){
        e.stopPropagation(); e.preventDefault();
        const id = m[2];
        if(bulkSelected.has(id)) bulkSelected.delete(id); else bulkSelected.add(id);
        render();
        return;
      }
    }
    e.stopPropagation();
    navigate('#'+b.getAttribute('data-go'));
  }));
  $$('[data-back]').forEach(b=>b.addEventListener('click',()=>{
    if(history.length>1) history.back(); else navigate('#home');
  }));
  $$('[data-nav]').forEach(b=>b.addEventListener('click',()=>navigate('#'+b.getAttribute('data-nav'))));

  // Cuisine filter tabs (recipes/fiches)
  $$('[data-rec-cuisine]').forEach(b=>b.addEventListener('click',()=>{
    recipesCuisineFilter = b.getAttribute('data-rec-cuisine');
    render();
  }));
  $$('[data-fic-cuisine]').forEach(b=>b.addEventListener('click',()=>{
    fichesCuisineFilter = b.getAttribute('data-fic-cuisine');
    render();
  }));

  // Pill groups (cuisine/type) — single-select
  $$('[data-pill-group]').forEach(group=>{
    const groupName = group.getAttribute('data-pill-group');
    const hidden = group.parentElement.querySelector(`input[name="${groupName}"]`);
    group.querySelectorAll('[data-pill]').forEach(pill=>{
      pill.addEventListener('click',()=>{
        const val = pill.getAttribute('data-pill');
        if(hidden) hidden.value = val;
        group.querySelectorAll('[data-pill]').forEach(p=>p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  });

  // Live update of link badge in recipe edit + quick-add ingredient
  $$('#ingFields .dynamic-item').forEach(row=>{
    const nameInput = row.querySelector('[name="ing_name"]');
    if(!nameInput) return;
    const badge = row.querySelector('.link-badge');
    const addBtn = row.querySelector('.add-ing-db');
    if(!badge) return;
    const update = ()=>{
      const v = nameInput.value.trim().toLowerCase();
      const found = v ? state.ingredients.find(i=>i.name.toLowerCase()===v) : null;
      if(found){
        badge.textContent = '⌁';
        badge.style.color = 'var(--success)';
        badge.title = 'Lié à : '+found.name;
        if(addBtn) addBtn.style.display = 'none';
      } else {
        badge.textContent = '·';
        badge.style.color = 'var(--cream-faint)';

      itemSelector: '.task-row',
      onReorder: async (fromIdx, toIdx) => {
        // Map filtered indices back to state.tasks indices
        const today = new Date().getDay();
        const filtered = state.tasks.filter(t=>{
          if(tasksTab==='today') return t.frequency==='daily' || (t.frequency==='weekly' && t.day===today);
          if(tasksTab==='week') return t.frequency==='weekly' || t.frequency==='daily';
          return true;
        });
        const movingTask = filtered[fromIdx];
        if(!movingTask) return;
        // Determine target task: insertion position in filtered
        // If toIdx is at end of filtered, append after last filtered task in state.tasks
        const realFromIdx = state.tasks.indexOf(movingTask);
        if(realFromIdx===-1) return;
        // Remove from real list first
        state.tasks.splice(realFromIdx, 1);
        // Where does it land in real list? before the task currently at filtered position toIdx (after removal)
        const newFiltered = state.tasks.filter(t=>{
          if(tasksTab==='today') return t.frequency==='daily' || (t.frequency==='weekly' && t.day===today);
          if(tasksTab==='week') return t.frequency==='weekly' || t.frequency==='daily';
          return true;
        });
        let insertBeforeTask = null;
        if(toIdx < newFiltered.length){
          insertBeforeTask = newFiltered[toIdx];
        }
        let realTo = state.tasks.length;
        if(insertBeforeTask){
          realTo = state.tasks.indexOf(insertBeforeTask);
        }
        state.tasks.splice(realTo, 0, movingTask);
        await persist();
        render();
      }
    });
  }

  // Routine sections (drag by title row)
  document.querySelectorAll('.routine-sections').forEach(sectionsContainer=>{
    const rouId = sectionsContainer.getAttribute('data-rou-id');
    enableDragReorder({
      container: sectionsContainer,
      itemSelector: '.routine-section',
      handleSelector: '.rs-title-row',
      onReorder: async (fromIdx, toIdx) => {
        const r = (state.routines||[]).find(x=>x.id===rouId);
        if(!r || !r.sections) return;
        // Move section
        const [moved] = r.sections.splice(fromIdx, 1);
        r.sections.splice(toIdx, 0, moved);
        // Remap checked keys: sections shifted positions need their checked entries updated
        const oldChecked = r.checked || {};
        const newChecked = {};
        // Build a mapping from old index to new index
        const oldOrder = [];
        for(let i=0; i<r.sections.length; i++) oldOrder.push(i);
        // After splice: at toIdx is the moved (was at fromIdx originally)
        // Construct old->new mapping
        const indexMap = {};
        // Original order before move: 0..N-1
        const originalIndices = Array.from({length: r.sections.length}, (_,i)=>i);
        // Apply the same splice to indices
        const [origMoved] = originalIndices.splice(fromIdx, 1);
        originalIndices.splice(toIdx, 0, origMoved);
        // originalIndices[newPos] = oldIdx
        originalIndices.forEach((oldIdx, newIdx) => {
          indexMap[oldIdx] = newIdx;
        });
        Object.keys(oldChecked).forEach(k=>{
          if(!oldChecked[k]) return;
          const [sIdx, iIdx] = k.split('-').map(Number);
          const newSi = indexMap[sIdx];
          if(newSi !== undefined) newChecked[`${newSi}-${iIdx}`] = true;
        });
        r.checked = newChecked;
        await persist();
        render();
      }
    });
  });

  // Routine items within a section
  document.querySelectorAll('.routine-items').forEach(itemsContainer=>{
    const rouId = itemsContainer.getAttribute('data-rou-id');
    const si = parseInt(itemsContainer.getAttribute('data-si'),10);
    enableDragReorder({
      container: itemsContainer,
      itemSelector: '.routine-item',
      onReorder: async (fromIdx, toIdx) => {
        const r = (state.routines||[]).find(x=>x.id===rouId);
        if(!r || !r.sections || !r.sections[si]) return;
        const items = r.sections[si].items;
        if(!items) return;
        const [moved] = items.splice(fromIdx, 1);
        items.splice(toIdx, 0, moved);
        // Remap checked keys for this section
        const oldChecked = r.checked || {};
        const newChecked = {};
        const originalIndices = Array.from({length: items.length}, (_,i)=>i);
        const [origMoved] = originalIndices.splice(fromIdx, 1);
        originalIndices.splice(toIdx, 0, origMoved);
        const indexMap = {};
        originalIndices.forEach((oldIdx, newIdx) => indexMap[oldIdx] = newIdx);
        Object.keys(oldChecked).forEach(k=>{
          if(!oldChecked[k]) return;
          const [sIdx, iIdx] = k.split('-').map(Number);
          if(sIdx === si){
            const newIi = indexMap[iIdx];
            if(newIi !== undefined) newChecked[`${sIdx}-${newIi}`] = true;
          } else {
            newChecked[k] = true;
          }
        });
        r.checked = newChecked;
        await persist();
        render();
      }
    });
  });
}

function bindPhotoHandlers(){
  // Empty state — click triggers file input
  $$('[data-photo-empty]').forEach(empty=>{
    const input = empty.querySelector('[data-photo-input]');
    if(!input) return;
    empty.addEventListener('click',e=>{
      if(e.target.tagName==='INPUT') return;
      input.click();
    });
    input.addEventListener('change',e=>handlePhotoChoose(e,empty,'empty'));
  });
  // Preview state — change / remove
  $$('[data-photo-preview]').forEach(preview=>{
    const input = preview.querySelector('[data-photo-input]');
    const change = preview.querySelector('[data-photo-change]');
    const remove = preview.querySelector('[data-photo-remove]');
    if(change && input){
      change.addEventListener('click',e=>{ e.preventDefault(); input.click(); });
      input.addEventListener('change',e=>handlePhotoChoose(e,preview,'preview'));
    }
    if(remove){
      remove.addEventListener('click',e=>{
        e.preventDefault();
        // Replace with empty state in place
        const wrap = preview.parentElement;
        preview.outerHTML = photoFieldHtml(null);
        bindPhotoHandlers();
      });
    }
  });
}

async function handlePhotoChoose(e,container,kind){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await compressImage(file, 1000, 0.75);
    // Replace container content with new preview
    const wrap = container.parentElement;
    container.outerHTML = photoFieldHtml(dataUrl);
    bindPhotoHandlers();
  }catch(err){
    alert('Impossible de lire l\'image : '+(err && err.message || err));
  }
}

    category: fd.get('category').toString().trim(),

function readWholeRoutineForm(){

  document.querySelectorAll('#rouSections > [data-section]').forEach(secEl=>{

function bindRoutineSectionTools(secEl){
  // Duplicate: clone this section's DOM node right after it (keeps unsaved edits)
  const dupBtn = secEl.querySelector('[data-dup-section]');
  if(dupBtn) dupBtn.addEventListener('click',()=>{
    const data = readOneSectionFromEl(secEl);
    const list = document.getElementById('rouSections');
    const idx = list.children.length;
    const div = document.createElement('div');
    div.innerHTML = sectionFieldRow({title: data.title ? data.title+' (copie)' : '', items: data.items.length?data.items:['']}, idx, {routine:true});
    const el = div.firstElementChild;
    secEl.parentNode.insertBefore(el, secEl.nextSibling);
    rebindSectionRow(el);
    bindRoutineSectionTools(el);
    toast('Section dupliquée');
  });

  // Move to another routine
  const moveBtn = secEl.querySelector('[data-move-section]');
  if(moveBtn) moveBtn.addEventListener('click',()=>{
    const form = readWholeRoutineForm();
    if(!form){ return; }
    if(!form.name){ alert('Donne d\'abord un nom à cette routine, puis réessaie.'); return; }
    const targets = (state.routines||[]).filter(r=>r.id !== form.editId);
    if(!targets.length){ alert('Aucune autre routine disponible. Crée d\'abord une autre routine.'); return; }
    const section = readOneSectionFromEl(secEl);
    if(!section.title || !section.items.length){ alert('Cette section est vide.'); return; }

    // Build a modal to pick the target routine
    const ov = document.createElement('div');
    ov.className = 'modal-bg';
    ov.innerHTML = `<div class="modal">
      <div style="font-family:var(--font-display);font-size:20px;color:var(--gold);letter-spacing:.04em;margin-bottom:6px">Déplacer la section</div>
      <p class="muted" style="font-size:13px;margin-bottom:14px">« ${escHtml(section.title)} » sera déplacée vers :</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${targets.map(t=>`<button class="btn btn-secondary" data-target="${t.id}" style="text-align:left">${escHtml(t.name)}</button>`).join('')}
      </div>
      <button class="btn btn-ghost btn-block" style="margin-top:14px" data-cancel-move>Annuler</button>
    </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click', async e=>{
      if(e.target===ov || e.target.closest('[data-cancel-move]')){ ov.remove(); return; }
      const tbtn = e.target.closest('[data-target]');
      if(!tbtn) return;
      const targetId = tbtn.getAttribute('data-target');
      const target = (state.routines||[]).find(r=>r.id===targetId);
      if(!target) { ov.remove(); return; }
      if(!confirm(`Déplacer « ${section.title} » vers « ${target.name} » ?\nLa routine actuelle sera enregistrée.`)){ return; }

      // Save current routine WITHOUT the moved section
      const remaining = form.sections.filter(s=>!(s.title===section.title && JSON.stringify(s.items)===JSON.stringify(section.items)));
      if(form.editId){
        const cur = state.routines.find(x=>x.id===form.editId);
        if(cur){
          cur.name = form.name;
          cur.subtitle = form.subtitle;
          cur.sections = remaining;
          // Drop checked entries that referenced removed sections (simplest: reset)
          cur.checked = cur.checked || {};
        }
      }
      // Append section to target
      target.sections = target.sections || [];
      target.sections.push({ title: section.title, items: section.items });
      await persist();
      ov.remove();
      toast('Section déplacée vers '+target.name);
      navigate('#routine/'+ (form.editId||target.id));
    });
  });
}

/* ---------- Init ---------- */
async function init(){
  let loaded = await Storage.load();

  // Migrate from v2 or v1 if no v3 found
  if(!loaded){
    let prev = null;
    let prevVersion = null;
    try{ const raw = localStorage.getItem('restoTool_v2'); if(raw){ prev = JSON.parse(raw); prevVersion='v2'; } }catch(e){}
    if(!prev){
      try{ const raw = localStorage.getItem('restoTool_v1'); if(raw){ prev = JSON.parse(raw); prevVersion='v1'; } }catch(e){}
    }
    if(prev){
      loaded = defaultData();
      if(Array.isArray(prev.recipes)) loaded.recipes = prev.recipes.map(r=>({photo:null,prepTime:null,cuisine:'',type:'',...r}));
      if(Array.isArray(prev.fiches)) loaded.fiches = prev.fiches.map(f=>({photo:null,prepTime:null,components:[],cuisine:'',type:'',...f}));
      if(Array.isArray(prev.tasks)) loaded.tasks = prev.tasks;
      if(Array.isArray(prev.ingredients)) loaded.ingredients = prev.ingredients;
      if(Array.isArray(prev.routines)) loaded.routines = prev.routines;
      if(prev.settings) loaded.settings = Object.assign(loaded.settings, prev.settings);
      toast('Données '+prevVersion+' migrées vers v3');
    } else {
      loaded = defaultData();
    }
    await Storage.save(loaded);
  }

  // Defensive defaults
  loaded.settings = Object.assign({
    showPrices:false, showCalories:true, showHalal:true, currency:'€',
    cuisines: ['burger','mexicain'],
    types: ['viandes','garnitures','sides','suppléments','sauces','marinades','féculents','pâtisserie','autres'],
    stores: ['Sligro','Carrefour','Magasins du monde'],
    role: 'service'
  }, loaded.settings||{});
  if(!loaded.settings.cuisines || !loaded.settings.cuisines.length) loaded.settings.cuisines = ['burger','mexicain'];
  if(!loaded.settings.types || !loaded.settings.types.length) loaded.settings.types = ['viandes','garnitures','sides','suppléments','sauces','marinades','féculents','pâtisserie','autres'];
  if(!loaded.settings.stores) loaded.settings.stores = ['Sligro','Carrefour','Magasins du monde'];
  if(!loaded.settings.role) loaded.settings.role = 'service';

  loaded.fiches = loaded.fiches||[];
  loaded.tasks = loaded.tasks||[];
  loaded.ingredients = loaded.ingredients||[];
  loaded.routines = loaded.routines||[];
  loaded.recipes = loaded.recipes||[];
  loaded.stock = loaded.stock||[];
  loaded.prep = loaded.prep||{};

  loaded.recipes.forEach(r=>{
    if(r.photo===undefined) r.photo = null;
    if(r.prepTime===undefined) r.prepTime = null;
    if(r.cuisine===undefined) r.cuisine = '';
    if(r.type===undefined) r.type = '';
    if(!r.restos) r.restos = [];
  });
  loaded.fiches.forEach(f=>{
    if(f.photo===undefined) f.photo = null;
    if(f.prepTime===undefined) f.prepTime = null;
    if(!f.components) f.components = [];
    if(f.cuisine===undefined) f.cuisine = '';
    if(f.type===undefined) f.type = '';
    if(!f.restos) f.restos = [];
  });
  loaded.ingredients.forEach(i=>{ if(!i.restos) i.restos = []; });
  loaded.tasks.forEach(t=>{ if(!t.restos) t.restos = []; });
  loaded.routines.forEach(r=>{ if(!r.restos) r.restos = []; });
  if(!loaded.restaurants || !loaded.restaurants.length) loaded.restaurants = [{id:'r_main', name:'Mexy Fresh by TheLab'}];

  state = loaded;
  window.addEventListener('hashchange',render);
  render();

  // Auto-pull at startup if sync configured + start polling
  const syncCfg = SyncConfig.load();
  if(syncCfg && syncCfg.token && syncCfg.owner && syncCfg.repo){
    setTimeout(()=>{
      cloudPull(true).then(()=>{
        updateSyncStatusUI();
        startPolling();
      });
    }, 500);
  }
}

function ensureDefaults(){
  if(!state) return;
  state.settings = state.settings || {};
  if(!state.settings.role) state.settings.role = 'service';
  if(!state.settings.cuisines) state.settings.cuisines = ['burger','mexicain'];
  if(!state.settings.types) state.settings.types = ['viandes','garnitures','sides','suppléments','sauces','marinades','féculents','pâtisserie','autres'];
  if(!state.settings.stores) state.settings.stores = ['Sligro','Carrefour','Magasins du monde'];
  if(!state.recipes) state.recipes = [];
  if(!state.fiches) state.fiches = [];
  if(!state.ingredients) state.ingredients = [];
  if(!state.tasks) state.tasks = [];
  if(!state.routines) state.routines = [];
  if(!state.stock) state.stock = [];
  if(!state.prep) state.prep = {};
  if(!state.restaurants || !state.restaurants.length) state.restaurants = [{id:'r_main', name:'Mexy Fresh by TheLab'}];
}

init();
</script>
</body>
</html>
